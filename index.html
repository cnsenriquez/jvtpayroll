<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAYROLL 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#eef1f8;--white:#fff;--border:#dde3ed;--border2:#c5cedd;
  --text:#1c2340;--text2:#5a6480;--text3:#9aa2bc;
  --blue:#1a4fcf;--blue-bg:#e8f0fe;
  --green:#065f46;--green-bg:#d1fae5;
  --red:#991b1b;--red-bg:#fee2e2;
  --orange:#92400e;--orange-bg:#fef3c7;
  --purple:#5b21b6;--purple-bg:#ede9fe;
  --teal:#0e7490;--teal-bg:#ecfeff;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:12px;min-height:100vh;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
button{cursor:pointer;font-family:inherit;}

/* ── TOPBAR ── */
#topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 16px;height:52px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 1px 8px rgba(20,40,100,.07);}
.logo{font-size:15px;font-weight:800;color:var(--blue);letter-spacing:-.3px;white-space:nowrap;}
.logo-sub{font-size:9px;color:var(--text3);letter-spacing:1.2px;text-transform:uppercase;margin-top:1px;}
.vdiv{width:1px;height:26px;background:var(--border);flex-shrink:0;}

/* PAGE TABS */
.page-tabs{display:flex;gap:2px;background:var(--bg);border-radius:8px;padding:3px;flex-shrink:0;}
.ptab{padding:5px 11px;border-radius:6px;border:none;background:none;font-size:11px;font-weight:600;color:var(--text3);transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:4px;}
.ptab:hover{color:var(--text2);}
.ptab.active{background:var(--white);color:var(--blue);box-shadow:0 1px 4px rgba(20,40,100,.12);}

/* BUTTONS */
.topbtns{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;border-radius:6px;font-size:11px;font-weight:600;border:none;transition:all .15s;white-space:nowrap;}
.btn-blue{background:var(--blue);color:#fff;}
.btn-blue:hover{background:#163fb5;}
.btn-ghost{background:var(--white);color:var(--text2);border:1px solid var(--border2);}
.btn-ghost:hover{background:var(--bg);}
.btn-green{background:var(--green-bg);color:var(--green);border:1px solid #6ee7b7;}
.btn-green:hover{background:#a7f3d0;}
.btn-red{background:var(--red-bg);color:var(--red);border:1px solid #fca5a5;}
.btn-red:hover{background:#fecaca;}

/* ── MAIN ── */
#main{padding:14px 16px 60px;max-width:1600px;margin:0 auto;}
.page-section{display:none;}
.page-section.active{display:block;}
.wrap{overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch;}
.section-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}

/* ── GROUP HEADERS ── */
.group-block{margin-bottom:18px;}
.group-head{display:flex;align-items:center;gap:8px;padding:7px 14px;border-radius:8px 8px 0 0;font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;cursor:pointer;user-select:none;border-bottom:none;position:sticky;left:0;}
.group-litrad{background:#eff6ff;color:#1e40af;border:1.5px solid #bfdbfe;border-bottom:none;}
.group-jvt{background:#ecfdf5;color:#065f46;border:1.5px solid #6ee7b7;border-bottom:none;}
.chevron{transition:transform .2s;}
.collapsed .chevron{transform:rotate(-90deg);}

/* ── PAYROLL TABLE ── */
.pt{border-collapse:collapse;background:var(--white);border:1.5px solid var(--border);border-top:none;border-radius:0 0 8px 8px;white-space:nowrap;}
.pt thead tr th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text3);padding:5px 3px;text-align:center;border-bottom:1px solid var(--border);border-right:1px solid var(--border);white-space:nowrap;}
.pt thead tr:first-child th{padding:5px 5px;font-size:9px;}
.pt thead th.nm{text-align:left;padding-left:10px;min-width:150px;max-width:150px;position:sticky;left:0;background:inherit;z-index:2;}
th.h-pay{background:#eff6ff;color:#1e40af!important;}
th.h-allow{background:#f0fdf4;color:#065f46!important;}
th.h-ot{background:#fffbeb;color:#92400e!important;}
th.h-hol{background:#fff7ed;color:#c2410c!important;}
th.h-sss{background:#fdf4ff;color:#7e22ce!important;}
th.h-ph{background:#f0f9ff;color:#0369a1!important;}
th.h-pag{background:#f0fdf4;color:#047857!important;}
th.h-sssl{background:#fef2f2;color:#991b1b!important;}
th.h-pagl{background:#fef2f2;color:#b91c1c!important;}
th.h-abs{background:#fffbeb;color:#b45309!important;}
th.h-net{background:#d1fae5;color:#065f46!important;font-size:10px!important;}
.pt tbody td{padding:0;border-right:1px solid #eef1f8;border-bottom:1px solid #f0f4f9;}
.pt tbody tr:last-child td{border-bottom:none;}
.pt tbody tr:hover td{background:#fafbff;}
td.nm{padding:0 10px;font-weight:600;font-size:11.5px;color:var(--text);white-space:nowrap;position:sticky;left:0;background:var(--white);z-index:1;border-right:1.5px solid var(--border2)!important;min-width:150px;max-width:150px;}
td.nm-inner{display:flex;align-items:center;justify-content:space-between;gap:4px;}
.emp-badge{font-size:9px;padding:1px 5px;border-radius:10px;font-weight:700;letter-spacing:.3px;flex-shrink:0;}
.badge-5d{background:#ede9fe;color:#5b21b6;}
.del-emp{background:none;border:none;color:#d1d9e8;font-size:15px;line-height:1;cursor:pointer;padding:0 2px;flex-shrink:0;}
.del-emp:hover{color:#ef4444;}
.pt td input{width:100%;border:none;background:transparent;text-align:center;padding:7px 10px;font-size:11.5px;font-family:inherit;color:var(--text);outline:none;transition:background .1s;min-width:100px;}
.pt td input:focus{background:#eef4ff;}
.pt td input.ded{color:var(--red);}
.pt td input.net-in{color:var(--green);font-weight:700;background:transparent!important;cursor:default;}
.pt td input.ot-auto{color:var(--orange);}
td.sep-l{border-left:2px solid var(--border2)!important;}
.pt tfoot td{background:#f4f7fc;border-top:2px solid var(--border2);padding:6px 5px;text-align:center;font-weight:700;font-size:11px;color:var(--text2);border-right:1px solid var(--border);}
.pt tfoot td.nm{text-align:left;font-size:10px;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;}
.pt tfoot td.tot-net{background:var(--green-bg);color:var(--green);}
.add-bar{background:var(--white);border:1.5px solid var(--border);border-top:none;border-radius:0 0 8px 8px;padding:6px 12px;display:flex;gap:8px;align-items:center;position:sticky;left:0;width:fit-content;}

/* ── OT TABLE ── */
.ot-top{display:flex;gap:12px;align-items:center;margin-bottom:14px;flex-wrap:wrap;}
.week-nav{display:flex;gap:5px;align-items:center;}
.week-nav button{background:var(--white);border:1px solid var(--border2);border-radius:6px;padding:4px 10px;font-size:12px;color:var(--text2);}
.week-lbl{font-size:13px;font-weight:700;color:var(--blue);min-width:190px;text-align:center;}
.wbtn{padding:4px 9px;border-radius:6px;font-size:11px;font-weight:600;border:1.5px solid var(--border);background:var(--white);color:var(--text3);}
.wbtn.active{border-color:var(--blue);background:var(--blue-bg);color:var(--blue);}
.ot-cards{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.oc{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:10px 14px;min-width:130px;}
.oc-l{font-size:9.5px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px;}
.oc-v{font-size:19px;font-weight:700;letter-spacing:-.4px;}
.oc-s{font-size:10px;color:var(--text3);margin-top:1px;}
.ot-g-lbl{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;padding:7px 14px;border-radius:8px 8px 0 0;margin-top:12px;}
.ot-g-litrad{background:#eff6ff;color:#1e40af;border:1.5px solid #bfdbfe;border-bottom:none;}
.ot-g-jvt{background:#ecfdf5;color:#065f46;border:1.5px solid #6ee7b7;border-bottom:none;}
.ott{border-collapse:collapse;background:var(--white);border:1.5px solid var(--border);border-top:none;white-space:nowrap;border-radius:0 0 8px 8px;}
.ott th{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text3);padding:5px 6px;text-align:center;border-bottom:1.5px solid var(--border2);border-right:1px solid var(--border);background:#f8faff;}
.ott th.nm{text-align:left;min-width:150px;background:#f8faff;}
.ott th.rc{background:#fffbeb;color:#92400e!important;min-width:72px;}
.ott th.dc{background:#f0f9ff;color:#0369a1!important;min-width:72px;}
.ott th.tc{background:#fffbeb;color:#c2410c!important;min-width:64px;}
.ott th.pc{background:#d1fae5;color:#065f46!important;min-width:88px;}
.ott td{padding:0;border-right:1px solid #eef1f8;border-bottom:1px solid #f0f4f9;}
.ott tbody tr:hover td{background:#fafbff;}
.ott td.nm{padding:6px 10px;font-weight:600;font-size:11.5px;white-space:nowrap;min-width:150px;border-right:1.5px solid var(--border2)!important;}
.ott td input{width:100%;border:none;background:transparent;text-align:center;padding:6px 8px;font-size:11.5px;font-family:inherit;color:var(--text);outline:none;transition:background .1s;min-width:72px;}
.ott td input:focus{background:#eef4ff;}
.ott td.rd input{color:var(--orange);font-weight:600;cursor:default;background:transparent;}
.ott td.dd input{color:#0369a1;}
.ott td.totd{background:#fffdf5;text-align:center;padding:5px 10px;font-weight:700;font-size:11.5px;color:var(--orange);}
.ott td.payd{background:#f0fdf4;text-align:center;padding:5px 10px;font-weight:700;font-size:11.5px;color:var(--green);}
.ott tfoot td{background:#f4f7fc;border-top:2px solid var(--border2);padding:5px 10px;text-align:center;font-weight:700;font-size:11px;color:var(--text2);border-right:1px solid var(--border);}
.ott tfoot td.nm{text-align:left;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;}
.ott tfoot td.fh{color:var(--orange);}
.ott tfoot td.fp{background:var(--green-bg);color:var(--green);}

/* ── WEEKLY SUMMARY ── */
.wsum-wrap{overflow-x:auto;padding-bottom:6px;}
.wst{border-collapse:collapse;background:var(--white);border:1.5px solid var(--border);border-radius:8px;white-space:nowrap;}
.wst th{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text3);padding:6px 8px;text-align:center;border-bottom:1.5px solid var(--border2);border-right:1px solid var(--border);background:#f8faff;}
.wst th.nm{text-align:left;min-width:150px;background:#f8faff;border-radius:8px 0 0 0;}
.wst th.wh{background:var(--blue-bg);color:var(--blue)!important;font-size:10px;}
.wst th.net-h{background:var(--green-bg);color:var(--green)!important;font-size:10px;}
.wst th.total-h{background:#1a4fcf;color:#fff!important;font-size:10px;}
.wst td{padding:0;border-right:1px solid #eef1f8;border-bottom:1px solid #f0f4f9;}
.wst tbody tr:hover td{background:#fafbff;}
.wst td.nm{padding:7px 10px;font-weight:600;font-size:11.5px;white-space:nowrap;min-width:150px;border-right:1.5px solid var(--border2)!important;}
.wst td.wv{text-align:center;padding:7px 10px;font-size:11.5px;color:var(--text2);}
.wst td.nv{text-align:center;padding:7px 10px;font-size:11.5px;font-weight:700;color:var(--green);}
.wst td.tv{text-align:center;padding:7px 10px;font-size:12px;font-weight:800;color:var(--blue);}
.wst tfoot td{background:#f0f4fb;border-top:2px solid var(--border2);padding:7px 8px;text-align:center;font-weight:700;font-size:11px;color:var(--text2);border-right:1px solid var(--border);}
.wst tfoot td.nm{text-align:left;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;}
.wst tfoot td.tot-col{background:var(--blue-bg);color:var(--blue);}
.grp-sep td{background:#f4f7fc!important;border-top:2px solid var(--border)!important;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;padding:5px 10px!important;}

/* ── LEAVE TAB ── */
.leave-header{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap;}
.leave-filter{padding:5px 11px;border-radius:6px;border:1.5px solid var(--border);background:var(--white);font-size:11.5px;font-family:inherit;color:var(--text2);outline:none;cursor:pointer;}
.leave-filter:focus{border-color:var(--blue);}
.lt{border-collapse:collapse;background:var(--white);border:1.5px solid var(--border);border-radius:8px;white-space:nowrap;}
.lt th{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text3);padding:7px 10px;text-align:left;border-bottom:1.5px solid var(--border2);border-right:1px solid var(--border);background:#f8faff;}
.lt td{padding:7px 10px;border-right:1px solid #eef1f8;border-bottom:1px solid #f0f4f9;font-size:11.5px;vertical-align:middle;}
.lt tbody tr:hover td{background:#fafbff;}
.lt tbody tr:last-child td{border-bottom:none;}
.lt td.emp-name{font-weight:600;min-width:150px;white-space:nowrap;}
.leave-type{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;letter-spacing:.3px;}
.lt-vl{background:#dbeafe;color:#1e40af;}
.lt-sl{background:#fce7f3;color:#9d174d;}
.lt-el{background:#d1fae5;color:#065f46;}
.lt-ml{background:#ede9fe;color:#5b21b6;}
.lt-unpaid{background:#fee2e2;color:#991b1b;}
.lt-other{background:#f0f4fb;color:#5a6480;}
.leave-status{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;}
.ls-approved{background:#d1fae5;color:#065f46;}
.ls-pending{background:#fef3c7;color:#92400e;}
.ls-denied{background:#fee2e2;color:#991b1b;}
.del-leave{background:none;border:none;color:#d1d9e8;font-size:14px;cursor:pointer;padding:0 3px;}
.del-leave:hover{color:#ef4444;}
.leave-balance-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:12px 16px;display:flex;gap:20px;flex-wrap:wrap;margin-bottom:14px;}
.lb-item .lb-label{font-size:9.5px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;}
.lb-item .lb-val{font-size:18px;font-weight:700;color:var(--blue);letter-spacing:-.3px;}
.lb-item .lb-sub{font-size:10px;color:var(--text3);}

/* ── PAYSLIP TAB ── */
.ps-sel{padding:5px 26px 5px 10px;border:1.5px solid var(--border2);border-radius:7px;font-size:12px;font-weight:700;font-family:inherit;color:var(--text);background:var(--white);outline:none;cursor:pointer;appearance:none;-webkit-appearance:none;}
.ps-sel:focus{border-color:var(--blue);}
.ps-controls{display:flex;gap:14px;align-items:center;flex-wrap:wrap;margin-bottom:18px;padding:10px 14px;background:var(--white);border:1px solid var(--border);border-radius:10px;}
.ps-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px;}
.payslip-card{background:#fff;border:1px solid #bbb;font-family:'DM Sans',sans-serif;box-shadow:0 2px 8px rgba(0,0,0,.07);}
.ps-header{background:#fff;padding:14px 18px 10px;text-align:center;border-bottom:2px solid #111;}
.ps-company{font-size:14px;font-weight:900;color:#111;letter-spacing:.5px;text-transform:uppercase;}
.ps-company-sub{font-size:8px;font-weight:700;color:#333;letter-spacing:2.5px;text-transform:uppercase;margin:2px 0;}
.ps-address{font-size:7.5px;color:#555;line-height:1.6;text-transform:uppercase;}
.ps-body{padding:11px 15px 10px;}
.ps-desc-label{font-size:7px;color:#999;letter-spacing:3px;text-transform:uppercase;padding-bottom:4px;border-bottom:1px solid #ddd;margin-bottom:8px;}
.ps-info-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px 10px;margin-bottom:6px;}
.ps-info-label{font-size:7.5px;color:#999;text-transform:uppercase;letter-spacing:.3px;margin-bottom:1px;}
.ps-info-val{font-size:10.5px;font-weight:700;color:#111;}
.ps-editable{font-size:10.5px;font-weight:700;color:#111;border:none;border-bottom:1px dashed #bbb;background:transparent;outline:none;width:100%;font-family:inherit;padding:0;cursor:text;}
.ps-editable:focus{border-bottom-color:#111;background:#f5f5f5;padding:1px 3px;}
.ps-tables-row{margin-bottom:7px;}
.ps-table-unified{width:100%;border-collapse:collapse;font-size:10px;border:1px solid #bbb;table-layout:fixed;}
.ps-th-earn{width:50%;background:#e8e8e8;color:#111;font-size:7.5px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;padding:5px 8px;border-bottom:1px solid #bbb;text-align:center;border-right:1px solid #bbb;}
.ps-th-ded{width:50%;background:#e8e8e8;color:#111;font-size:7.5px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;padding:5px 8px;border-bottom:1px solid #bbb;text-align:center;}
.ps-td-earn{width:50%;padding:4px 8px;border-bottom:1px solid #ebebeb;border-right:1px solid #bbb;}
.ps-td-ded{width:50%;padding:4px 8px;border-bottom:1px solid #ebebeb;}
.ps-total-unified td{background:#e8e8e8;color:#111;font-weight:800;font-size:10.5px;padding:5px 8px;border-top:1px solid #bbb;}
.ps-total-unified td:first-child{border-right:1px solid #bbb;}
.ps-net-box{background:#111;padding:9px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.ps-net-label{font-size:9px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:1px;}
.ps-net-amt{font-size:18px;font-weight:800;color:#fff;}
.ps-words{font-size:8px;color:#444;font-style:italic;background:#f5f5f5;padding:5px 10px;border-left:3px solid #999;margin-bottom:10px;}
.ps-sigs{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding-top:8px;border-top:1px dashed #ccc;}
.ps-sig-line{border-bottom:1.5px solid #111;height:24px;margin-bottom:4px;}
.ps-sig-name{font-size:9.5px;font-weight:800;color:#111;text-align:center;}
.ps-sig-title{font-size:8px;color:#777;text-align:center;}
.ps-pdf-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;background:#111;color:#fff;border:none;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s;border-radius:5px;}
.ps-pdf-btn:hover{background:#333;}

/* ── STATUS BAR ── */
#sbar{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);padding:6px 16px;display:flex;gap:18px;align-items:center;font-size:11px;color:var(--text3);box-shadow:0 -1px 8px rgba(20,40,100,.06);z-index:50;}
#sbar .lbl{font-weight:700;color:var(--text2);}
#sbar .val{font-weight:700;color:var(--blue);}
#sbar .val-g{color:var(--green);}
#sbar .autosave{margin-left:auto;display:flex;align-items:center;gap:4px;}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(15,25,60,.45);backdrop-filter:blur(5px);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px;}
.modal{background:var(--white);border-radius:14px;padding:22px;max-width:400px;width:100%;box-shadow:0 24px 60px rgba(15,25,60,.22);}
.modal h3{font-size:15px;font-weight:700;color:var(--text);margin-bottom:12px;}
.modal p{font-size:13px;color:var(--text2);margin-bottom:16px;}
.modal label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:3px;}
.modal input,.modal select{width:100%;border:1.5px solid var(--border);border-radius:7px;padding:8px 10px;font-size:13px;font-family:inherit;color:var(--text);outline:none;margin-bottom:10px;background:var(--white);}
.modal input:focus,.modal select:focus{border-color:var(--blue);}
.modal-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:4px;}
.hidden{display:none!important;}

@media print{
  #topbar,.topbtns,.vdiv,.ps-controls,.ps-pdf-btn{display:none!important;}
  .page-section{display:none!important;}
  #page-payslip{display:block!important;}
  .ps-grid{grid-template-columns:1fr 1fr;}
  .payslip-card{box-shadow:none;break-inside:avoid;}

<script>
const SECTIONS=[
  {k:'pay',  l:'REGULAR PAY',         cls:'h-pay',  ded:false},
  {k:'allow',l:'WEEKLY ALLOWANCE',    cls:'h-allow',ded:false},
  {k:'ot',   l:'REGULAR OVERTIME',    cls:'h-ot',   ded:false},
  {k:'hol',  l:'C/A - HOLIDAY PAY',   cls:'h-hol',  ded:false},
  {k:'sss',  l:'SSS',                 cls:'h-sss',  ded:true },
  {k:'ph',   l:'PHILHEALTH',          cls:'h-ph',   ded:true },
  {k:'pag',  l:'PAG-IBIG',            cls:'h-pag',  ded:true },
  {k:'sssl', l:'SSS LOAN',            cls:'h-sssl', ded:true },
  {k:'pagl', l:'PAG-IBIG LOAN',       cls:'h-pagl', ded:true },
  {k:'abs',  l:'ABSENCES/DEDS',       cls:'h-abs',  ded:true },
];
const WKS=['W1','W2','W3','W4','W5'];
const DAYS=['Thu','Fri','Sat','Sun','Mon','Tue','Wed'];
const MO=['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];
const LEAVE_TYPES={VL:{l:'Vacation Leave',cls:'lt-vl'},SL:{l:'Sick Leave',cls:'lt-sl'},EL:{l:'Emergency Leave',cls:'lt-el'},ML:{l:'Maternity/Paternity',cls:'lt-ml'},UNPAID:{l:'Unpaid Leave',cls:'lt-unpaid'},OTHER:{l:'Other',cls:'lt-other'}};
const LEAVE_ALLOC={'PEREZ, JOEY':6,'ALAMER, REY':6,'GONZAGA, ROMEO':6,'ORTIZ, JENNY':12};
function getLeaveAlloc(n){return LEAVE_ALLOC[n]||5;}
function getLeaveUsed(n){let u=0;Object.values(DB).forEach(mo=>{if(!mo.leaves)return;mo.leaves.filter(l=>l.emp===n&&l.status==='approved').forEach(l=>u+=n2(l.days));});return u;}

let DB={}, curMonth='', curPage='payroll', otWkIdx=0;
const WEEKLY_EXCL=[];
let pendingGroup='', confirmCb=null;

function save(){localStorage.setItem('pr26c',JSON.stringify(DB));localStorage.setItem('pr26cm',curMonth);}
function load(){
  const r=localStorage.getItem('pr26c');
  DB=r?JSON.parse(r):{};
  curMonth=localStorage.getItem('pr26cm')||'';
  if(!Object.keys(DB).filter(k=>k!=='_empMeta').length){DB['JANUARY']=seedJan();DB['FEBRUARY']=seedFeb();curMonth='FEBRUARY';}
  if(!curMonth||!DB[curMonth]) curMonth=Object.keys(DB).filter(k=>k!=='_empMeta')[0]||'';
}

const n2=v=>{const x=parseFloat(String(v||'').replace(/,/g,''));return isNaN(x)?0:x;};
const P=v=>{const x=n2(v);return x?x.toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2}):'';}
const PF=v=>'₱'+n2(v).toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2});

function calcOTPay(emp,wk){const dr=getEffDailyRate(emp,wk);if(!dr)return 0;const hr=dr/8;const hrs=DAYS.reduce((s,d)=>s+n2(emp.ot?.[wk]?.[d]),0);return parseFloat((hr*1.25*hrs).toFixed(2));}
function getEffDailyRate(emp,wk){const wd=emp.workDays||6;if(n2(emp.dailyRate)>0)return n2(emp.dailyRate);const base=n2(emp.cells['pay_'+wk])+n2(emp.cells['allow_'+wk]);return base/wd;}
function getOTHrs(emp,wk){return DAYS.reduce((s,d)=>s+n2(emp.ot?.[wk]?.[d]),0);}
function calcNet(emp,wk){const e=['pay','allow','ot','hol'].reduce((s,k)=>s+n2(emp.cells[k+'_'+wk]),0);const d=['sss','ph','pag','sssl','pagl','abs'].reduce((s,k)=>s+n2(emp.cells[k+'_'+wk]),0);return e-d;}
function ensureOT(emp){if(!emp.ot)emp.ot={};WKS.forEach(w=>{if(!emp.ot[w])emp.ot[w]={};DAYS.forEach(d=>{if(emp.ot[w][d]===undefined)emp.ot[w][d]='';});});}
function mkEmp(name,vals={},workDays=6,dailyRate=null){const e={name,workDays,dailyRate,cells:{},ot:{},leave:[]};SECTIONS.forEach(s=>WKS.forEach(w=>{e.cells[s.k+'_'+w]=vals[s.k+'_'+w]??'';}));WKS.forEach(w=>{e.ot[w]={};DAYS.forEach(d=>{e.ot[w][d]='';});});return e;}

    mkEmp('GONZAGA, ROMEO',{pay_W1:3948,pay_W2:3948,pay_W3:3948,pay_W4:3948,pay_W5:3948,allow_W1:234,allow_W2:234,allow_W3:234,allow_W4:234,allow_W5:234,ot_W1:1742.5,ot_W2:1960.31,ot_W3:2777.11,hol_W3:313.5},6),
    mkEmp('ORTIZ, JENNY',{pay_W1:4000,pay_W2:4000,pay_W3:4000,pay_W4:4000,pay_W5:4000,ot_W1:1500,ot_W2:1625,ot_W3:1500,sss_W2:337.5,sss_W4:337.5,ph_W2:75,ph_W4:75,pag_W2:100,pag_W4:100},5),
    mkEmp('PEREZ, JOEY',{pay_W1:3948,pay_W2:3948,pay_W3:3948,pay_W4:3948,pay_W5:3948,allow_W1:690,allow_W2:690,allow_W3:690,allow_W4:690,allow_W5:690,ot_W1:1449.38,ot_W2:966.25,hol_W3:232,sss_W2:236.25,sss_W4:236.25,ph_W2:75,ph_W4:75,pag_W2:100,pag_W4:100},6),
    mkEmp('BALDOMARO, DANILO',{pay_W1:3948,pay_W2:3948,pay_W3:3948,pay_W4:3948,pay_W5:3948,ot_W1:2313.28,ot_W2:976.72,ot_W3:2159.06,hol_W3:197},6),
    mkEmp('BATTILER, CHITO',{pay_W1:3948,pay_W2:3948,pay_W3:3948,pay_W4:3948,pay_W5:3948,ot_W1:1490.78,ot_W2:1182.34,ot_W3:1028.13,abs_W1:1316,abs_W3:658},6),
    mkEmp('GABIJAN, RONALD',{pay_W1:3948,pay_W2:3948,pay_W3:3948,pay_W4:3948,pay_W5:3948,ot_W1:2775.94,ot_W2:1182.34,ot_W3:2159.06,hol_W3:197},6),
  ];
  const J=[
    mkEmp('BABIERA, JOVAN',{pay_W1:3948,pay_W2:3948,pay_W3:3948,pay_W4:3948,pay_W5:3948,allow_W1:378,allow_W2:378,allow_W3:378,allow_W4:378,allow_W5:378,ot_W1:1468.59,ot_W2:903.75,ot_W3:2824.22,hol_W3:217,sss_W1:225,sss_W2:225,sss_W3:225,sss_W4:225,ph_W1:106.25,ph_W2:106.25,ph_W3:106.25,ph_W4:106.25,pag_W1:50,pag_W2:50,pag_W3:50,pag_W4:50,abs_W2:500},6,723),
    mkEmp('ENRIQUEZ, CRISTIAN',{pay_W1:4320,pay_W2:4320,pay_W3:4320,pay_W4:4320,pay_W5:4320,ot_W1:225,ot_W2:562.5,ot_W3:450,sss_W1:225,sss_W2:225,sss_W3:225,sss_W4:225,ph_W1:112.5,ph_W2:112.5,ph_W3:112.5,ph_W4:112.5,pag_W1:50,pag_W2:50,pag_W3:50,pag_W4:50},6),
    mkEmp('GABIJAN, JAPHET',{pay_W1:3948,pay_W2:3948,pay_W3:3948,pay_W4:3948,pay_W5:3948,ot_W1:2056.25,ot_W2:1850.63,ot_W3:2261.88,hol_W3:197},6),
    mkEmp('GADITANO, BENJONES',{pay_W1:3290,pay_W2:3290,pay_W3:3290,pay_W4:3290,pay_W5:3290,ot_W1:565.47,ot_W2:565.47,ot_W3:308.44,pag_W1:50,pag_W2:50,pag_W3:50,pag_W4:50},5),
    mkEmp('MOISES, CHRISTIAN',{pay_W1:3948,pay_W2:3948,pay_W3:3948,pay_W4:3948,pay_W5:3948,ot_W1:3032.97,ot_W2:1336.56,ot_W3:2570.31,hol_W3:197,sss_W1:212.5,sss_W2:212.5,sss_W3:212.5,sss_W4:212.5,ph_W1:106.25,ph_W2:106.25,ph_W3:106.25,ph_W4:106.25,pag_W1:50,pag_W2:50,pag_W3:50,pag_W4:50},6),
    mkEmp('OFIANA, MICTHEL',{pay_W1:4500,pay_W2:4500,pay_W3:4500,pay_W4:4500,pay_W5:4500},5),
    mkEmp('SARCILLA, CHARLIE',{pay_W1:3948,pay_W2:3948,pay_W3:3948,pay_W4:3948,pay_W5:3948,ot_W1:3135.78,ot_W2:1850.63,ot_W3:2570.31,hol_W3:197,sss_W1:212.5,sss_W2:212.5,sss_W3:212.5,sss_W4:212.5,ph_W1:106.25,ph_W2:106.25,ph_W3:106.25,ph_W4:106.25,pag_W1:50,pag_W2:50,pag_W3:50,pag_W4:50},6),
    mkEmp('CASPE, MOSES',{pay_W1:3948,pay_W2:3948,pay_W3:3948,pay_W4:3948,pay_W5:3948,ot_W1:411.25,ot_W2:514.06,ot_W3:411.25,sss_W1:212.5,sss_W2:212.5,sss_W3:212.5,sss_W4:212.5,ph_W1:106.25,ph_W2:106.25,ph_W3:106.25,ph_W4:106.25,pag_W1:50,pag_W2:50,pag_W3:50,pag_W4:50},6),
  ];
  return {litrad:L,jvt:J,leaves:[]};
}
function seedJan(){
  const mo=seedFeb();
  const clr=['ot','hol','abs','sssl','pagl'];
  [...mo.litrad,...mo.jvt].forEach(e=>{clr.forEach(k=>WKS.forEach(w=>{e.cells[k+'_'+w]=''}));WKS.forEach(w=>{DAYS.forEach(d=>{e.ot[w][d]='';});});});
  mo.litrad[0].cells['sssl_W1']=740.93;mo.litrad[0].cells['sssl_W3']=740.93;
  mo.litrad[3].cells['sssl_W1']=694.71;mo.litrad[3].cells['sssl_W3']=694.71;
  return mo;
}

const PAGES=['payroll','ot','weekly','leave','payslip'];
function switchPage(p){
  curPage=p;
  PAGES.forEach(x=>{
    document.getElementById('page-'+x).classList.toggle('active',x===p);
    document.getElementById('ptab-'+x).classList.toggle('active',x===p);
  });
  if(p==='ot') renderOT();
  else if(p==='weekly') renderWeekly();
  else if(p==='leave') renderLeave();
  else if(p==='payslip') renderPayslip();
}

function toggleGroup(id,btn){document.getElementById(id).classList.toggle('hidden');btn.classList.toggle('collapsed');}

function openNewMonth(){document.getElementById('nm-inp').value='';openModal('m-new');setTimeout(()=>document.getElementById('nm-inp').focus(),60);}
function confirmNewMonth(){
  let name=document.getElementById('nm-inp').value.trim().toUpperCase();
  if(!name)return;if(DB[name]){alert('Month already exists!');return;}
  const months=Object.keys(DB).filter(k=>k!=='_empMeta');
  const last=months.length?DB[months[months.length-1]]:null;
  const clr=['ot','hol','abs','sssl','pagl'];
  const cloneGrp=emps=>emps.map(e=>{const ne=mkEmp(e.name,{},e.workDays||6);SECTIONS.forEach(s=>WKS.forEach(w=>{const k=s.k+'_'+w;ne.cells[k]=clr.includes(s.k)?'':e.cells[k];}));WKS.forEach(w=>{DAYS.forEach(d=>{ne.ot[w][d]='';});});return ne;});
  DB[name]=last?{litrad:cloneGrp(last.litrad),jvt:cloneGrp(last.jvt),leaves:[]}:seedFeb();
  curMonth=name;otWkIdx=0;save();renderAll();closeModal('m-new');
}
function askDeleteMonth(){
  if(Object.keys(DB).filter(k=>k!=='_empMeta').length<=1){alert('Cannot delete the only month.');return;}
  openConfirm(`Delete "${curMonth}"?`,`All payroll, OT, and leave data for ${curMonth} will be deleted.`,()=>{
    delete DB[curMonth];
    const s=Object.keys(DB).filter(k=>k!=='_empMeta').sort((a,b)=>{const ai=MO.indexOf(a),bi=MO.indexOf(b);return(ai<0?99:ai)-(bi<0?99:bi);});
    curMonth=s[0]||'';save();renderAll();
  });
}

function openAddEmp(g){pendingGroup=g;document.getElementById('emp-inp').value='';document.getElementById('emp-days').value='6';document.getElementById('m-emp-title').textContent=`Add Employee — ${g.toUpperCase()}`;openModal('m-emp');setTimeout(()=>document.getElementById('emp-inp').focus(),60);}
function confirmAddEmp(){const name=document.getElementById('emp-inp').value.trim().toUpperCase();const wd=parseInt(document.getElementById('emp-days').value)||6;if(!name)return;DB[curMonth][pendingGroup].push(mkEmp(name,{},wd));save();renderPayroll();updateSbar();closeModal('m-emp');}
function askDelEmp(g,i){const name=DB[curMonth][g][i].name;openConfirm(`Remove "${name}"?`,`Remove from ${g.toUpperCase()} for ${curMonth}?`,()=>{DB[curMonth][g].splice(i,1);save();renderPayroll();updateSbar();});}

function exportCSV(){
  if(!curMonth||!DB[curMonth])return;
  const rows=[],hdr=['GROUP','EMPLOYEE','WORK_DAYS'];
  SECTIONS.forEach(s=>WKS.forEach(w=>hdr.push(`${s.l}_${w}`)));
  WKS.forEach(w=>hdr.push('NET_'+w));WKS.forEach(w=>DAYS.forEach(d=>hdr.push(`OT_${w}_${d}`)));
  rows.push(hdr.join(','));
  ['litrad','jvt'].forEach(g=>{DB[curMonth][g].forEach(emp=>{const r=[g.toUpperCase(),`"${emp.name}"`,emp.workDays||6];SECTIONS.forEach(s=>WKS.forEach(w=>r.push(n2(emp.cells[s.k+'_'+w]).toFixed(2))));WKS.forEach(w=>r.push(calcNet(emp,w).toFixed(2)));WKS.forEach(w=>DAYS.forEach(d=>r.push(n2(emp.ot?.[w]?.[d]).toFixed(1))));rows.push(r.join(','));});});
  const blob=new Blob([rows.join('\
')],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`PAYROLL_${curMonth}_${curYear}.csv`;a.click();
}

function openModal(id){document.getElementById(id).classList.remove('hidden');}
function closeModal(id){document.getElementById(id).classList.add('hidden');}
function openConfirm(title,msg,cb){document.getElementById('conf-title').textContent=title;document.getElementById('conf-msg').textContent=msg;confirmCb=cb;openModal('m-conf');}

['m-new','m-emp','m-conf','m-leave'].forEach(id=>{document.getElementById(id).addEventListener('click',e=>{if(e.target.id===id)closeModal(id);});});

document.addEventListener('keydown',e=>{
  if((e.key==='Enter'||e.key==='Tab')&&document.activeElement.tagName==='INPUT'&&!document.activeElement.readOnly){
    const all=[...document.querySelectorAll('.pt input[type=number]:not([readonly]),.ott input[type=number]:not([readonly])')];
    const idx=all.indexOf(document.activeElement);if(idx>=0&&idx<all.length-1){e.preventDefault();all[idx+1].focus();all[idx+1].select();}
  }
  if(e.key==='Escape')['m-new','m-emp','m-conf','m-leave'].forEach(id=>closeModal(id));
});


function updateSbar(){
  const mo=DB[curMonth];
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  set('sb-m', curMonth?curMonth+' '+curYear:'—');
  if(!mo){set('sb-l','₱0');set('sb-j','₱0');set('sb-t','₱0');return;}
  const sum=(emps,key)=>emps.filter(e=>!WEEKLY_EXCL.includes(e.name))
    .reduce((s,e)=>s+WKS.reduce((ws,w)=>ws+n2(e.cells[key+'_'+w]),0),0);
  const netOf=(emps)=>emps.filter(e=>!WEEKLY_EXCL.includes(e.name))
    .reduce((s,e)=>s+WKS.reduce((ws,w)=>{
      const earn=n2(e.cells['pay_'+w])+n2(e.cells['allow_'+w])+n2(e.cells['ot_'+w])+n2(e.cells['hol_'+w]);
      const ded=n2(e.cells['sss_'+w])+n2(e.cells['ph_'+w])+n2(e.cells['pag_'+w])+n2(e.cells['sssl_'+w])+n2(e.cells['pagl_'+w])+n2(e.cells['abs_'+w]);
      return ws+earn-ded;
    },0),0);
  const lNet=netOf(mo.litrad||[]);
  const jNet=netOf(mo.jvt||[]);
  set('sb-l', '₱'+lNet.toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2}));
  set('sb-j', '₱'+jNet.toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2}));
  set('sb-t', '₱'+(lNet+jNet).toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2}));
}
function renderAll(){
  renderYearTabs();
  renderTabs();
  renderPayroll();
  const p=curPage;
  if(p==='ot') renderOT();
  else if(p==='weekly') renderWeekly();
  else if(p==='leave') renderLeave();
  else if(p==='payslip') renderPayslip();
  updateSbar();
}

function getYearList(){
  const stored=JSON.parse(localStorage.getItem('pr26_years')||'[]');
  if(!stored.includes(curYear))stored.push(curYear);
  stored.sort();
  localStorage.setItem('pr26_years',JSON.stringify(stored));
  return stored;
}
function switchYear(yr){
  save();
  localStorage.setItem('pr26_curyear',yr);
  curYear=yr;
  const raw=localStorage.getItem('pr26c_'+yr);
  DB=raw?JSON.parse(raw):{};
  curMonth=localStorage.getItem('pr26cm_'+yr)||'';
  if(!Object.keys(DB).filter(k=>k!=='_empMeta').length){DB['JANUARY']=seedJan();DB['FEBRUARY']=seedFeb();curMonth='FEBRUARY';}
  if(!curMonth||!DB[curMonth])curMonth=Object.keys(DB).filter(k=>k!=='_empMeta')[0]||'';
  otWkIdx=0;
  renderAll();
}
function addYear(){
  const yr=document.getElementById('year-new-input');
  if(!yr)return;
  const v=yr.value.trim();
  if(!v||isNaN(v))return;
  const updated=getYearList();
  if(!updated.includes(v)){updated.push(v);updated.sort();localStorage.setItem('pr26_years',JSON.stringify(updated));}
  yr.value='';
  if(curYear===yr.value){switchYear(updated[0]);}else{renderYearTabs();}
}
function renderYearTabs(){
  const sel=document.getElementById('year-select');
  if(!sel)return;
  const ylist=getYearList();
  sel.innerHTML=ylist.map(y=>`<option value="${y}"${y===curYear?' selected':''}>${y}</option>`).join('');
  document.getElementById('logo-year').textContent='JVT CORPORATION';
  const ls=document.getElementById('logo-sub-year');if(ls)ls.textContent='PAYROLL SYSTEM \u00b7 '+curYear;
}

function renderTabs(){
  const sel=document.getElementById('month-select');

  const s=Object.keys(DB).filter(k=>k!=='_empMeta').sort((a,b)=>{const ai=MO.indexOf(a.toUpperCase()),bi=MO.indexOf(b.toUpperCase());return(ai<0?99:ai)-(bi<0?99:bi);});

function switchMonth(m){curMonth=m;otWkIdx=0;save();renderAll();}

function renderPGroup(title,gk,emps){

}
function renderPRow(emp,ei,gk){
  ensureOT(emp);
  const is5d=(emp.workDays||6)===5;
  const badge=is5d?'<span class="emp-badge badge-5d">5d</span>':'';
  let cells=`<td class="nm"><div class="nm-inner"><span>${emp.name}${badge?'&nbsp;'+badge:''}</span><button class="del-emp" onclick="askDelEmp('${gk}',${ei})">×</button></div></td>`;
  SECTIONS.forEach((s,si)=>{
    WKS.forEach((w,wi)=>{
      const ck=s.k+'_'+w,val=emp.cells[ck]??'';
      const dc=s.ded?' ded':'',sl=si>0&&wi===0?' sep-l':'',oc=s.k==='ot'?' ot-auto':'';
      cells+=`<td class="${sl}"><input type="number" step="0.01" min="0" value="${val}" data-g="${gk}" data-i="${ei}" data-k="${ck}" onchange="onPayCell(this)" onfocus="this.select()" class="${dc}${oc}"></td>`;
    });
  });
  WKS.forEach((w,wi)=>{
    const net=calcNet(emp,w);
    const sl=wi===0?' sep-l':'';
    cells+=`<td class="${sl}" style="background:#f0fdf4"><input type="number" class="net-in" readonly value="${net?net.toFixed(2):''}" data-g="${gk}" data-i="${ei}" data-nw="${w}"></td>`;
  });
  return `<tr id="tr-${gk}-${ei}">${cells}</tr>`;
}
function renderPFoot(emps,gk){
  let c=`<td class="nm">TOTAL</td>`;
  SECTIONS.forEach((s,si)=>{
    WKS.forEach((w,wi)=>{
      const tot=emps.reduce((sum,e)=>sum+n2(e.cells[s.k+'_'+w]),0);
      const sl=si>0&&wi===0?' sep-l':'',col=s.ded?'var(--red)':'var(--blue)';
      c+=`<td id="ft-${gk}-${s.k}-${w}" class="${sl}" style="color:${col}">${tot?P(tot):''}</td>`;
    });
  });
  WKS.forEach((w,wi)=>{
    const tot=emps.reduce((s,e)=>s+calcNet(e,w),0);
    c+=`<td id="ft-${gk}-net-${w}" class="tot-net${wi===0?' sep-l':''}">${tot?P(tot):''}</td>`;
  });
  return `<tr>${c}</tr>`;
}
function onPayCell(inp){
  const g=inp.dataset.g,i=parseInt(inp.dataset.i),k=inp.dataset.k;
  DB[curMonth][g][i].cells[k]=inp.value===''?'':parseFloat(inp.value)||0;
  const emp=DB[curMonth][g][i];
  WKS.forEach(w=>{const ni=document.querySelector(`input[data-g="${g}"][data-i="${i}"][data-nw="${w}"]`);if(ni)ni.value=calcNet(emp,w)?calcNet(emp,w).toFixed(2):'';});
  const[sk,wk]=k.split('_');
  updPFoot(g,sk,wk);WKS.forEach(w=>updNFoot(g,w));
  updateSbar();save();
}
function updPFoot(g,sk,wk){const tot=DB[curMonth][g].reduce((s,e)=>s+n2(e.cells[sk+'_'+wk]),0);const el=document.getElementById(`ft-${g}-${sk}-${wk}`);if(el)el.textContent=tot?P(tot):'';}
function updNFoot(g,w){const tot=DB[curMonth][g].reduce((s,e)=>s+calcNet(e,w),0);const el=document.getElementById(`ft-${g}-net-${w}`);if(el)el.textContent=tot?P(tot):'';}

function getWeekStartDate(wkIdx){const wk=WKS[wkIdx];const stored=DB[curMonth]?.weekDates?.[wk];if(stored)return new Date(stored);const moIdx=MO.indexOf(curMonth.toUpperCase());const yr=parseInt(curYear)||new Date().getFullYear();return new Date(yr,moIdx,wkIdx*7+1);}
function getWeekDates(wkIdx){const startDate=getWeekStartDate(wkIdx);return DAYS.map((d,i)=>{const date=new Date(startDate);date.setDate(startDate.getDate()+i);const mo2=date.toLocaleString('en-US',{month:'short'});const day=date.getDate();return{label:d,date:mo2+' '+day,isoDate:date.toISOString().slice(0,10)};});}
function setWeekStartDate(wkIdx,isoDate){if(!DB[curMonth].weekDates)DB[curMonth].weekDates={};DB[curMonth].weekDates[WKS[wkIdx]]=isoDate;save();renderOT();}

function renderOT(){
  const area=document.getElementById('ot-area');
  if(!curMonth||!DB[curMonth]){area.innerHTML='';return;}
  const wk=WKS[otWkIdx],mo=DB[curMonth];
  const allEmps=[...mo.litrad,...mo.jvt];
  allEmps.forEach(e=>ensureOT(e));
  const tHrs=allEmps.reduce((s,e)=>s+getOTHrs(e,wk),0);
  const tPay=allEmps.reduce((s,e)=>s+calcOTPay(e,wk),0);
  const lPay=mo.litrad.reduce((s,e)=>s+calcOTPay(e,wk),0);
  const jPay=mo.jvt.reduce((s,e)=>s+calcOTPay(e,wk),0);
  area.innerHTML=`<div class="section-title">OT MONITORING — <span style="color:var(--blue)">${curMonth} ${curYear}</span></div>
  <div class="ot-top"><div class="week-nav"><button onclick="otWkIdx=Math.max(0,otWkIdx-1);renderOT()">‹</button><div class="week-lbl">WEEK ${otWkIdx+1} &nbsp;·&nbsp; ${curMonth} ${curYear}</div><button onclick="otWkIdx=Math.min(4,otWkIdx+1);renderOT()">›</button></div>
  <div style="display:flex;gap:5px">${WKS.map((w,i)=>`<button class="wbtn${i===otWkIdx?' active':''}" onclick="otWkIdx=${i};renderOT()">W${i+1}</button>`).join('')}</div></div>
  <div class="ot-cards"><div class="oc"><div class="oc-l">Total OT Hours</div><div class="oc-v" style="color:var(--orange)">${tHrs.toFixed(1)}</div><div class="oc-s">All employees · Wk ${otWkIdx+1}</div></div>
  <div class="oc"><div class="oc-l">Total OT Pay</div><div class="oc-v" style="color:var(--green)">${PF(tPay)}</div><div class="oc-s">Rate × 1.25</div></div>
  <div class="oc"><div class="oc-l">LITRAD OT Pay</div><div class="oc-v" style="color:var(--blue);font-size:16px">${PF(lPay)}</div><div class="oc-s">${mo.litrad.length} employees</div></div>
  <div class="oc"><div class="oc-l">JVT PAYROLL OT</div><div class="oc-v" style="color:#065f46;font-size:16px">${PF(jPay)}</div><div class="oc-s">${mo.jvt.length} employees</div></div></div>
  <div class="wrap"><div class="ot-g-lbl ot-g-litrad">LITRAD EMPLOYEES</div>${renderOTTable(mo.litrad,'litrad',wk)}<div style="height:14px"></div><div class="ot-g-lbl ot-g-jvt">JVT PAYROLL</div>${renderOTTable(mo.jvt,'jvt',wk)}</div>
  <div style="margin-top:12px;padding:9px 13px;background:var(--blue-bg);border:1px solid #bfdbfe;border-radius:8px;font-size:11px;color:var(--blue)"><b>Formula:</b> Hourly Rate = Weekly Pay ÷ Work Days ÷ 8hrs &nbsp;·&nbsp; OT Pay = Hourly Rate × 1.25 × Total OT Hrs</div>`;
}
function renderOTTable(emps,gk,wk){
  const wkIdx=WKS.indexOf(wk);const weekDates=getWeekDates(wkIdx);const startIso=weekDates[0].isoDate;
  const dh=weekDates.map(wd=>`<th class="dc"><div style="font-size:9.5px;font-weight:800">${wd.label}</div><div style="font-size:9px;opacity:.8">${wd.date}</div></th>`).join('');
  const dateRowHtml=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;padding:6px 10px;background:var(--blue-bg);border:1px solid #bfdbfe;border-radius:8px;font-size:11px;color:var(--blue)"><b>Week start (Thu):</b><input type="date" value="${startIso}" style="border:1px solid #bfdbfe;border-radius:5px;padding:3px 7px;font-size:11px;font-family:inherit;color:var(--blue);background:#f0f7ff;outline:none" onchange="setWeekStartDate(${wkIdx},this.value)"><span style="opacity:.6">Dates auto-fill Thu → Wed</span></div>`;
  const rows=emps.map((emp,ei)=>{
    ensureOT(emp);const dr=getEffDailyRate(emp,wk),hr=dr/8;const tHrs=getOTHrs(emp,wk),otPay=calcOTPay(emp,wk);
    const hasCustomRate=n2(emp.dailyRate)>0;const dayCells=DAYS.map(d=>`<td class="dd"><input type="number" step="0.5" min="0" max="24" value="${emp.ot[wk][d]||''}" data-g="${gk}" data-i="${ei}" data-wk="${wk}" data-day="${d}" onchange="onOTCell(this)" onfocus="this.select()"></td>`).join('');
    const is5d=(emp.workDays||6)===5;const badge=is5d?' <span class="emp-badge badge-5d" style="font-size:8px">5d</span>':'';
    return `<tr><td class="nm">${emp.name}${badge}${hasCustomRate?'<span title="Custom daily rate" style="margin-left:4px;font-size:9px;background:#fef3c7;color:#92400e;padding:1px 5px;border-radius:8px;font-weight:700">★</span>':''}</td>
    <td class="rd"><input type="number" step="0.01" value="${dr?dr.toFixed(2):''}" data-g="${gk}" data-i="${ei}" onchange="onDailyRateChange(this)" onfocus="this.select()" style="color:var(--orange);font-weight:600;text-align:center;background:${hasCustomRate?'#fffbeb':'transparent'}"></td>
    <td class="rd"><input type="number" value="${hr?hr.toFixed(4):''}" id="ot-hr-${gk}-${ei}" readonly style="color:var(--orange);font-weight:600;cursor:default;font-size:10.5px;text-align:center"></td>
    ${dayCells}<td class="totd" id="ot-h-${gk}-${ei}-${wk}">${tHrs?tHrs.toFixed(1):''}</td><td class="payd" id="ot-p-${gk}-${ei}-${wk}">${otPay?P(otPay):''}</td></tr>`;
  }).join('');
  const dayTots=DAYS.map(d=>emps.reduce((s,e)=>s+n2(e.ot?.[wk]?.[d]),0));
  const totH=dayTots.reduce((s,v)=>s+v,0),totP=emps.reduce((s,e)=>s+calcOTPay(e,wk),0);
  const ftd=dayTots.map(t=>`<td class="fh">${t?t.toFixed(1):''}</td>`).join('');
  return dateRowHtml+`<table class="ott"><thead><tr><th class="nm">EMPLOYEE</th><th class="rc">DAILY RATE</th><th class="rc">HOURLY RATE</th>${dh}<th class="tc">TOTAL HRS</th><th class="pc">OT PAY (×1.25)</th></tr></thead><tbody id="ot-tb-${gk}">${rows}</tbody><tfoot><tr><td class="nm">TOTAL</td><td></td><td></td>${ftd}<td class="fh">${totH?totH.toFixed(1):''}</td><td class="fp">${totP?P(totP):''}</td></tr></tfoot></table>`;
}
function onDailyRateChange(inp){
  const g=inp.dataset.g,i=parseInt(inp.dataset.i),emp=DB[curMonth][g][i],val=inp.value===''?null:parseFloat(inp.value)||0;emp.dailyRate=val;

}

  const g=inp.dataset.g,i=parseInt(inp.dataset.i),wk=inp.dataset.wk,day=inp.dataset.day,emp=DB[curMonth][g][i];

  const allEmps=DB[curMonth][g],dayTots=DAYS.map(d=>allEmps.reduce((s,e)=>s+n2(e.ot?.[wk]?.[d]),0));
  const totH=dayTots.reduce((s,v)=>s+v,0),totP=allEmps.reduce((s,e)=>s+calcOTPay(e,wk),0);

function renderWeekly(){
  const area=document.getElementById('weekly-area');
  if(!curMonth||!DB[curMonth]){area.innerHTML='';return;}
  const mo=DB[curMonth];
  const mSum=(emp,keys)=>WKS.reduce((s,w)=>s+keys.reduce((ss,k)=>ss+n2(emp.cells[k+'_'+w]),0),0);

const EMP_META_DEFAULT={designation:'WORKER',department:'OPERATIONS'};

function setEmpMeta(name,field,val){

  DB._empMeta[name][field]=val;save();

function numToWords(n){
  const ones=['','ONE','TWO','THREE','FOUR','FIVE','SIX','SEVEN','EIGHT','NINE','TEN','ELEVEN','TWELVE','THIRTEEN','FOURTEEN','FIFTEEN','SIXTEEN','SEVENTEEN','EIGHTEEN','NINETEEN'];
  const tens=['','','TWENTY','THIRTY','FORTY','FIFTY','SIXTY','SEVENTY','EIGHTY','NINETY'];
  function w(num){if(num===0)return'';if(num<20)return ones[num]+' ';if(num<100)return tens[Math.floor(num/10)]+' '+(num%10?ones[num%10]+' ':'');return ones[Math.floor(num/100)]+' HUNDRED '+(num%100?w(num%100):'');}
  const cents=Math.round((n%1)*100),pesos=Math.floor(n);
  let result='';
  if(pesos>0){if(pesos>=1000000)result+=w(Math.floor(pesos/1000000))+'MILLION ';if(pesos>=1000)result+=w(Math.floor((pesos%1000000)/1000))+'THOUSAND ';result+=w(pesos%1000);result+='PESOS';}
  if(cents>0)result+=' AND '+w(cents)+'CENTAVOS';
  if(pesos===0&&cents===0)result='ZERO PESOS';
  return result.trim();
}

      <button class="ps-pdf-btn" onclick="window.print()" style="background:#444;">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>Print
      </button>
    </div>
  </div>
  ${psLayout==='allweeks'
    ? buildAllWeeksView(visible)
    : psLayout==='fullpage'
    ? buildFullPageView(visible,psWeek)
    : `<div class="ps-grid">${cards}</div>`
  }`;
}

function buildAllWeeksView(visible){
  const parts=visible.map(emp=>{
    const activeWks=WKS.filter(wk=>n2(emp.cells['pay_'+wk])>0||n2(emp.cells['ot_'+wk])>0||n2(emp.cells['allow_'+wk])>0||n2(emp.cells['hol_'+wk])>0);
    if(!activeWks.length)return '';
    const cards=activeWks.map((wk,wi)=>{
      const br=wi<activeWks.length-1?'border-right:1px solid var(--border);':'';
      return '<div style="'+br+'padding:12px;">'+buildPayslipCard(emp,wk)+'</div>';
    }).join('');
    return '<div style="background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:24px;">'
      +'<div style="padding:10px 16px;background:var(--blue-bg);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;">'
      +'<span style="font-size:12px;font-weight:800;color:var(--blue)">'+emp.name+'</span>'
      +'<span style="font-size:10px;color:var(--text3);font-weight:600;">'+(emp._grp==='LITRAD'?'LITRAD INC.':'JVT CORPORATION')+' · '+curMonth+' '+curYear+'</span>'
      +'</div>'
      +'<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:0;">'+cards+'</div>'
      +'</div>';
  });
  return '<div>'+parts.join('')+'</div>';
}

function buildFullPageView(visible,wk){
  const parts=visible.map(emp=>{
    return '<div style="background:#f8faff;border:1px solid var(--border);border-radius:10px;margin-bottom:16px;overflow:hidden;">'
      +'<div style="padding:6px 14px;background:var(--blue-bg);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;">'
      +'<span style="font-size:11px;font-weight:700;color:var(--blue)">'+emp.name+'</span>'
      +'<span style="font-size:10px;color:var(--text3)">'+curMonth+' '+curYear+' · '+wk+'</span>'
      +'</div>'
      +'<div style="padding:12px;display:flex;justify-content:center;">'
      +'<div style="max-width:700px;width:100%">'+buildPayslipCard(emp,wk)+'</div>'
      +'</div></div>';
  });
  return '<div>'+parts.join('')+'</div>';
}

function buildPayslipCard(emp,wk){
  const meta=getEmpMeta(emp.name);
  const pay=n2(emp.cells['pay_'+wk]),allow=n2(emp.cells['allow_'+wk]);
  const ot=n2(emp.cells['ot_'+wk]),hol=n2(emp.cells['hol_'+wk]);
  const sss=n2(emp.cells['sss_'+wk]),ph=n2(emp.cells['ph_'+wk]);
  const pag=n2(emp.cells['pag_'+wk]),sssl=n2(emp.cells['sssl_'+wk]);
  const pagl=n2(emp.cells['pagl_'+wk]),abs=n2(emp.cells['abs_'+wk]);
  const totalEarn=pay+allow+ot+hol,totalDed=sss+ph+pag+sssl+pagl+abs,net=totalEarn-totalDed;
  // Build unified row array — one td per side using flex for label+amount
  const eArr=[[' Regular Pay',pay],['Allowance',allow],['Overtime Pay',ot],['Holiday Pay',hol]].filter(r=>r[1]>0);
  const dArr=[['SSS',sss],['PhilHealth',ph],['Pag-IBIG',pag],['SSS Loan',sssl],['Pag-IBIG Loan',pagl],['Absences/Deds',abs]].filter(r=>r[1]>0);
  const maxR=Math.max(eArr.length,dArr.length,1);
  const tdRow=(lbl,amt,cls)=>`<td class="${cls}"><div style="display:flex;justify-content:space-between;align-items:center;"><span style="color:#222">${lbl}</span><span style="color:#555;font-weight:500">${amt}</span></div></td>`;
  let unifiedRows='';
  for(let i=0;i<maxR;i++){
    const el=eArr[i]||null, dl=dArr[i]||null;
    unifiedRows+=`<tr>
      ${tdRow(el?el[0]:'', el?P(el[1]):'', 'ps-td-earn')}
      ${tdRow(dl?dl[0]:'', dl?P(dl[1]):'', 'ps-td-ded')}
    </tr>`;
  }
  const empSafe=emp.name.replace(/'/g,"\\'");
  return `<div class="payslip-card">
  <div class="ps-header">
    <div class="ps-company">${emp._grp==='LITRAD'?'LITRAD INC.':'JVT CORPORATION'}</div>
    <div class="ps-company-sub">PAYROLL SLIP</div>
    <div class="ps-address">PAYSLIP &nbsp;·&nbsp; ${curMonth} ${curYear} &nbsp;·&nbsp; WEEK ${WKS.indexOf(wk)+1}</div>
  </div>
  <div class="ps-body">
    <div class="ps-desc-label">Employee Details</div>
    <div class="ps-info-grid">
      <div><div class="ps-info-label">Name</div><div class="ps-info-val" style="font-size:9.5px">${emp.name}</div></div>
      <div><div class="ps-info-label">Designation</div><input class="ps-editable" value="${meta.designation}" onblur="setEmpMeta('${empSafe}','designation',this.value)" onkeydown="if(event.key==='Enter')this.blur()"></div>
      <div><div class="ps-info-label">Department</div><input class="ps-editable" value="${meta.department}" onblur="setEmpMeta('${empSafe}','department',this.value)" onkeydown="if(event.key==='Enter')this.blur()"></div>
    </div>
    <div class="ps-desc-label">Earnings &amp; Deductions</div>
    <div class="ps-tables-row">
      <table class="ps-table-unified">
        <thead><tr>
          <th class="ps-th-earn">Earnings</th>
          <th class="ps-th-ded">Deductions</th>
        </tr></thead>
        <tbody>${unifiedRows}</tbody>
        <tfoot><tr class="ps-total-unified">
          <td><div style="display:flex;justify-content:space-between;"><span>Total</span><span>${P(totalEarn)}</span></div></td>
          <td><div style="display:flex;justify-content:space-between;"><span>Total</span><span>${totalDed>0?P(totalDed):''}</span></div></td>
        </tr></tfoot>
      </table>
    </div>
    <div class="ps-net-box"><span class="ps-net-label">Net Pay</span><span class="ps-net-amt">PHP ${P(net)}</span></div>
    <div class="ps-words">${numToWords(net)}</div>
    <div class="ps-sigs">
      <div><div class="ps-sig-line"></div><div class="ps-sig-name">${emp.name}</div><div class="ps-sig-title">Employee Signature</div></div>
      <div><div class="ps-sig-line"></div><div class="ps-sig-name">AUTHORIZED SIGNATORY</div><div class="ps-sig-title">Employer / HR</div></div>
    </div>
  </div>
</div>`;
}

function drawPayslipOnPage(doc,emp,wk,mx,my,mw,mh){
  const meta=getEmpMeta(emp.name);
  const pay=n2(emp.cells['pay_'+wk]),allow=n2(emp.cells['allow_'+wk]);
  const ot=n2(emp.cells['ot_'+wk]),hol=n2(emp.cells['hol_'+wk]);
  const sss=n2(emp.cells['sss_'+wk]),ph=n2(emp.cells['ph_'+wk]);
  const pag=n2(emp.cells['pag_'+wk]),sssl=n2(emp.cells['sssl_'+wk]);
  const pagl=n2(emp.cells['pagl_'+wk]),abs=n2(emp.cells['abs_'+wk]);
  const totalEarn=pay+allow+ot+hol,totalDed=sss+ph+pag+sssl+pagl+abs,net=totalEarn-totalDed;
  // Always 4 rows fixed (max possible earn items) — blank if empty
  const eAll=[[' Regular Pay',pay],[' Allowance',allow],[' Overtime Pay',ot],[' Holiday Pay',hol]];
  const dAll=[[' SSS',sss],[' PhilHealth',ph],[' Pag-IBIG',pag],[' SSS Loan',sssl],[' Pag-IBIG Loan',pagl],[' Absences',abs]];
  const eF=eAll.filter(r=>r[1]>0), dF=dAll.filter(r=>r[1]>0);
  const ROWS=Math.max(eF.length,dF.length,1); // dynamic but same both sides
  const m=mx,cw=mw; let y=my;
  const half=cw/2;

  // Outer border
  doc.setDrawColor(187,187,187);doc.setLineWidth(0.35);doc.rect(m,y,cw,mh||250,'S');

  // ── HEADER — exact match to on-screen ──
  // .ps-company: bold 14px
  doc.setFont('helvetica','bold');doc.setFontSize(14);doc.setTextColor(17,17,17);
  doc.text(emp._grp==='LITRAD'?'LITRAD INC.':'JVT CORPORATION',m+cw/2,y+10,{align:'center'});
  // .ps-company-sub: bold 7px letter-spacing 2.5px
  doc.setFont('helvetica','bold');doc.setFontSize(7);doc.setTextColor(51,51,51);
  doc.setCharSpace(2.5);doc.text('PAYROLL SLIP',m+cw/2,y+15.5,{align:'center'});doc.setCharSpace(0);
  // .ps-address: "PAYSLIP · MONTH YEAR · WEEK N" — includes PAYSLIP prefix like on screen
  doc.setFont('helvetica','normal');doc.setFontSize(6.5);doc.setTextColor(85,85,85);
  doc.text('PAYSLIP  \u00b7  '+curMonth+' '+curYear+'  \u00b7  WEEK '+(WKS.indexOf(wk)+1),m+cw/2,y+20,{align:'center'});
  // border-bottom: 2px solid #111
  doc.setDrawColor(17,17,17);doc.setLineWidth(0.7);doc.line(m,y+24,m+cw,y+24);
  y+=28;

  // ── EMPLOYEE DETAILS ──
  doc.setFont('helvetica','normal');doc.setFontSize(6);doc.setTextColor(153,153,153);
  doc.setCharSpace(2);doc.text('EMPLOYEE DETAILS',m+4,y+3.5);doc.setCharSpace(0);
  doc.setDrawColor(221,221,221);doc.setLineWidth(0.15);doc.line(m,y+5,m+cw,y+5);
  y+=9;
  doc.setFont('helvetica','normal');doc.setFontSize(6);doc.setTextColor(153,153,153);
  doc.text('NAME',m+4,y+3);doc.text('DESIGNATION',m+cw/3+4,y+3);doc.text('DEPARTMENT',m+cw*2/3+4,y+3);
  doc.setFont('helvetica','bold');doc.setFontSize(9.5);doc.setTextColor(17,17,17);
  doc.text(emp.name,m+4,y+9.5);doc.text(meta.designation,m+cw/3+4,y+9.5);doc.text(meta.department,m+cw*2/3+4,y+9.5);
  doc.setDrawColor(187,187,187);doc.setLineWidth(0.2);doc.setLineDashPattern([1,1],0);
  doc.line(m+cw/3+4,y+11,m+cw*2/3-2,y+11);doc.line(m+cw*2/3+4,y+11,m+cw-2,y+11);
  doc.setLineDashPattern([],0);
  y+=16;

  // ── EARNINGS & DEDUCTIONS label ──
  doc.setFont('helvetica','normal');doc.setFontSize(6);doc.setTextColor(153,153,153);
  doc.setCharSpace(2);doc.text('EARNINGS & DEDUCTIONS',m+4,y+3.5);doc.setCharSpace(0);
  doc.setDrawColor(221,221,221);doc.setLineWidth(0.15);doc.line(m,y+5,m+cw,y+5);
  y+=9;

  // ── TABLE — fixed ROWS count both sides ──
  const ROW=6.5;
  const tH=(1+ROWS+1)*ROW;
  doc.setDrawColor(187,187,187);doc.setLineWidth(0.3);
  doc.rect(m,y,cw,tH,'S');
  doc.line(m+half,y,m+half,y+tH); // center divider

  // Header row
  doc.setFillColor(232,232,232);doc.rect(m,y,half,ROW,'F');doc.rect(m+half,y,half,ROW,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(7);doc.setTextColor(17,17,17);
  doc.setCharSpace(0.5);
  doc.text('EARNINGS',m+half/2,y+ROW-1.5,{align:'center'});
  doc.text('DEDUCTIONS',m+half+half/2,y+ROW-1.5,{align:'center'});
  doc.setCharSpace(0);
  doc.setDrawColor(187,187,187);doc.setLineWidth(0.2);doc.line(m,y+ROW,m+cw,y+ROW);
  y+=ROW;

  // Data rows — SAME count each side, blank cells if no item
  for(let i=0;i<ROWS;i++){
    const er=eF[i]||null, dr=dF[i]||null;
    doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(34,34,34);
    if(er){doc.text(er[0],m+4,y+ROW-1.8);doc.text(P(er[1]),m+half-3,y+ROW-1.8,{align:'right'});}
    if(dr){doc.text(dr[0],m+half+4,y+ROW-1.8);doc.text(P(dr[1]),m+cw-3,y+ROW-1.8,{align:'right'});}
    doc.setDrawColor(235,235,235);doc.setLineWidth(0.1);
    doc.line(m,y+ROW,m+cw,y+ROW);
    y+=ROW;
  }

  // Total row
  doc.setFillColor(232,232,232);doc.rect(m,y,cw,ROW,'F');
  doc.setDrawColor(187,187,187);doc.setLineWidth(0.2);doc.line(m,y,m+cw,y);
  doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(17,17,17);
  doc.text('Total',m+4,y+ROW-1.8);doc.text(P(totalEarn),m+half-3,y+ROW-1.8,{align:'right'});
  doc.text('Total',m+half+4,y+ROW-1.8);
  if(totalDed>0)doc.text(P(totalDed),m+cw-3,y+ROW-1.8,{align:'right'});
  y+=ROW+5;

  // ── NET PAY ──
  doc.setFillColor(17,17,17);doc.rect(m,y,cw,14,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(8.5);doc.setTextColor(255,255,255);
  doc.setCharSpace(1);doc.text('NET PAY',m+5,y+9.5);doc.setCharSpace(0);
  doc.setFontSize(14);doc.text('PHP '+P(net),m+cw-4,y+10,{align:'right'});
  y+=18;

  // ── WORDS ──
  doc.setFillColor(245,245,245);doc.rect(m,y,cw,9,'F');
  doc.setFillColor(153,153,153);doc.rect(m,y,3,9,'F');
  doc.setFont('helvetica','italic');doc.setFontSize(7.5);doc.setTextColor(68,68,68);
  doc.text(doc.splitTextToSize(numToWords(net),cw-14)[0]||'',m+6,y+6);
  y+=14;

  // ── SIGNATURES ──
  doc.setDrawColor(204,204,204);doc.setLineWidth(0.2);doc.setLineDashPattern([1.5,1.5],0);
  doc.line(m,y,m+cw,y);doc.setLineDashPattern([],0);
  y+=6;
  const s1=m+cw/4,s2=m+cw*3/4;
  doc.setDrawColor(17,17,17);doc.setLineWidth(0.5);
  doc.line(s1-28,y+10,s1+28,y+10);doc.line(s2-28,y+10,s2+28,y+10);
  doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(17,17,17);
  doc.text(emp.name,s1,y+15,{align:'center'});doc.text('AUTHORIZED SIGNATORY',s2,y+15,{align:'center'});
  doc.setFont('helvetica','normal');doc.setFontSize(7);doc.setTextColor(119,119,119);
  doc.text('Employee Signature',s1,y+19.5,{align:'center'});doc.text('Employer / HR',s2,y+19.5,{align:'center'});
}

function exportAllPayslipsPDF(){
  const mo=DB[curMonth];if(!mo)return;
  const{jsPDF}=window.jspdf;
  const allEmps=[...mo.litrad.map(e=>({...e,_grp:'LITRAD'})),...mo.jvt.map(e=>({...e,_grp:'JVT'}))];
  let visible=psGroup==='litrad'?allEmps.filter(e=>e._grp==='LITRAD'):psGroup==='jvt'?allEmps.filter(e=>e._grp==='JVT'):allEmps;
  if(psEmployee!=='all')visible=visible.filter(e=>e.name===psEmployee);

  if(psLayout==='fullpage'){
    // Full page mode: 1 payslip centered per A4 page
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    visible.forEach((emp,idx)=>{
      if(idx>0)doc.addPage();
      drawPayslipOnPage(doc,emp,psWeek,20,20,170,null);
    });
    doc.save('PAYSLIPS_'+curMonth+'_'+curYear+'_'+psWeek+'_FULLPAGE.pdf');
    return;
  }

  if(psLayout==='allweeks'){
    const doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
    const PW=297,PH=210,MARGIN=7,GAP_COL=5,GAP_ROW=5;
    const boxW=(PW-MARGIN*2-GAP_COL)/2; // ~139mm each

    // drawWeekBox: draws one week payslip into exact bx,by,bw,bh box
    function drawWeekBox(emp,wk,bx,by,bw,bh){
      const meta=getEmpMeta(emp.name);
      const pay=n2(emp.cells['pay_'+wk]),allow=n2(emp.cells['allow_'+wk]);
      const ot=n2(emp.cells['ot_'+wk]),hol=n2(emp.cells['hol_'+wk]);
      const sss=n2(emp.cells['sss_'+wk]),ph=n2(emp.cells['ph_'+wk]);
      const pag=n2(emp.cells['pag_'+wk]),sssl=n2(emp.cells['sssl_'+wk]);
      const pagl=n2(emp.cells['pagl_'+wk]),abs=n2(emp.cells['abs_'+wk]);
      const totalEarn=pay+allow+ot+hol,totalDed=sss+ph+pag+sssl+pagl+abs,net=totalEarn-totalDed;
      const eF=[[' Regular Pay',pay],[' Allowance',allow],[' Overtime Pay',ot],[' Holiday Pay',hol]].filter(r=>r[1]>0);
      const dF=[[' SSS',sss],[' PhilHealth',ph],[' Pag-IBIG',pag],[' SSS Loan',sssl],[' Pag-IBIG Loan',pagl],[' Absences',abs]].filter(r=>r[1]>0);
      const ROWS=Math.max(eF.length,dF.length,1);
      const wkNum=WKS.indexOf(wk)+1;
      const nm=emp.name.length>20?emp.name.slice(0,19)+'…':emp.name;
      const half=bw/2;

      // Fixed proportional heights
      const HDR=13,EMP=12,EDL=5,THDR=5,TROW=5,TTOT=5,NET=11,WRD=7;
      const usedH=HDR+EMP+EDL+THDR+(ROWS*TROW)+TTOT+NET+WRD;
      const SIG=bh-usedH;

      doc.setFillColor(255,255,255);doc.rect(bx,by,bw,bh,'F');
      doc.setDrawColor(160,160,160);doc.setLineWidth(0.35);doc.rect(bx,by,bw,bh,'S');

      let y=by;

      // Header — includes PAYSLIP prefix matching on-screen
      doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(17,17,17);
      doc.text(emp._grp==='LITRAD'?'LITRAD INC.':'JVT CORPORATION',bx+bw/2,y+5.5,{align:'center'});
      doc.setFont('helvetica','bold');doc.setFontSize(6);doc.setTextColor(51,51,51);
      doc.setCharSpace(2);doc.text('PAYROLL SLIP',bx+bw/2,y+9,{align:'center'});doc.setCharSpace(0);
      doc.setFont('helvetica','normal');doc.setFontSize(5.5);doc.setTextColor(85,85,85);
      doc.text('PAYSLIP  ·  '+curMonth+' '+curYear+'  ·  WEEK '+wkNum,bx+bw/2,y+12.5,{align:'center'});
      doc.setDrawColor(17,17,17);doc.setLineWidth(0.55);doc.line(bx,y+HDR,bx+bw,y+HDR);
      y+=HDR;

      // Employee info
      doc.setFont('helvetica','normal');doc.setFontSize(5);doc.setTextColor(153,153,153);
      doc.text('NAME',bx+3,y+2.5);doc.text('DESIGNATION',bx+bw/3+3,y+2.5);doc.text('DEPARTMENT',bx+bw*2/3+3,y+2.5);
      doc.setFont('helvetica','bold');doc.setFontSize(7);doc.setTextColor(17,17,17);
      doc.text(nm,bx+3,y+8.5);doc.text(meta.designation,bx+bw/3+3,y+8.5);doc.text(meta.department,bx+bw*2/3+3,y+8.5);
      y+=EMP;

      // E&D label
      doc.setFont('helvetica','normal');doc.setFontSize(5);doc.setTextColor(153,153,153);
      doc.setCharSpace(1.5);doc.text('EARNINGS & DEDUCTIONS',bx+3,y+3.5);doc.setCharSpace(0);
      y+=EDL;

      // Table
      const tH=THDR+(ROWS*TROW)+TTOT;
      doc.setDrawColor(175,175,175);doc.setLineWidth(0.2);
      doc.rect(bx,y,bw,tH,'S');doc.line(bx+half,y,bx+half,y+tH);

      // Header row
      doc.setFillColor(232,232,232);doc.rect(bx,y,half,THDR,'F');doc.rect(bx+half,y,half,THDR,'F');
      doc.setFont('helvetica','bold');doc.setFontSize(6);doc.setTextColor(17,17,17);
      doc.setCharSpace(0.3);
      doc.text('EARNINGS',bx+half/2,y+THDR-1.2,{align:'center'});
      doc.text('DEDUCTIONS',bx+half+half/2,y+THDR-1.2,{align:'center'});
      doc.setCharSpace(0);
      doc.setDrawColor(175,175,175);doc.setLineWidth(0.15);doc.line(bx,y+THDR,bx+bw,y+THDR);
      y+=THDR;

      // Data rows — always ROWS count, blank if no item
      for(let i=0;i<ROWS;i++){
        const er=eF[i]||null,dr=dF[i]||null;
        doc.setFont('helvetica','normal');doc.setFontSize(6.5);doc.setTextColor(34,34,34);
        if(er){doc.text(er[0],bx+3,y+TROW-1.4);doc.text(P(er[1]),bx+half-2,y+TROW-1.4,{align:'right'});}
        if(dr){doc.text(dr[0],bx+half+3,y+TROW-1.4);doc.text(P(dr[1]),bx+bw-2,y+TROW-1.4,{align:'right'});}
        doc.setDrawColor(220,220,220);doc.setLineWidth(0.1);doc.line(bx,y+TROW,bx+bw,y+TROW);
        y+=TROW;
      }

      // Total row
      doc.setFillColor(232,232,232);doc.rect(bx,y,bw,TTOT,'F');
      doc.setDrawColor(175,175,175);doc.setLineWidth(0.15);doc.line(bx,y,bx+bw,y);
      doc.setFont('helvetica','bold');doc.setFontSize(6.5);doc.setTextColor(17,17,17);
      doc.text('Total',bx+3,y+TTOT-1.4);doc.text(P(totalEarn),bx+half-2,y+TTOT-1.4,{align:'right'});
      doc.text('Total',bx+half+3,y+TTOT-1.4);
      if(totalDed>0)doc.text(P(totalDed),bx+bw-2,y+TTOT-1.4,{align:'right'});
      y+=TTOT;

      // NET PAY
      doc.setFillColor(17,17,17);doc.rect(bx,y,bw,NET,'F');
      doc.setFont('helvetica','bold');doc.setFontSize(7);doc.setTextColor(255,255,255);
      doc.setCharSpace(0.8);doc.text('NET PAY',bx+4,y+7.5);doc.setCharSpace(0);
      doc.setFontSize(9.5);doc.text('PHP '+P(net),bx+bw-3,y+7.5,{align:'right'});
      y+=NET;

      // Words
      doc.setFillColor(245,245,245);doc.rect(bx,y,bw,WRD,'F');
      doc.setFillColor(140,140,140);doc.rect(bx,y,2,WRD,'F');
      doc.setFont('helvetica','italic');doc.setFontSize(5.5);doc.setTextColor(68,68,68);
      const wds=numToWords(net);
      doc.text(wds.length>70?wds.slice(0,69)+'…':wds,bx+4,y+5);
      y+=WRD;

      // Signatures — fills remaining space
      const sigY=y+Math.max(SIG*0.4,3);
      doc.setDrawColor(17,17,17);doc.setLineWidth(0.35);
      doc.line(bx+bw/4-18,sigY+8,bx+bw/4+18,sigY+8);
      doc.line(bx+bw*3/4-18,sigY+8,bx+bw*3/4+18,sigY+8);
      doc.setFont('helvetica','bold');doc.setFontSize(5.5);doc.setTextColor(17,17,17);
      doc.text(nm,bx+bw/4,sigY+12,{align:'center'});
      doc.text('AUTHORIZED SIGNATORY',bx+bw*3/4,sigY+12,{align:'center'});
      doc.setFont('helvetica','normal');doc.setFontSize(5);doc.setTextColor(119,119,119);
      doc.text('Employee Signature',bx+bw/4,sigY+15.5,{align:'center'});
      doc.text('Employer / HR',bx+bw*3/4,sigY+15.5,{align:'center'});
    }

    // ── Layout: 2 boxes per row, weeks stacked ──
    visible.forEach((emp,empIdx)=>{
      if(empIdx>0)doc.addPage();
      const activeWks=WKS.filter(wk=>
        n2(emp.cells['pay_'+wk])>0||n2(emp.cells['ot_'+wk])>0||
        n2(emp.cells['allow_'+wk])>0||n2(emp.cells['hol_'+wk])>0
      );
      if(!activeWks.length)activeWks.push('W1');
      const totalRows=Math.ceil(activeWks.length/2);
      const boxH=(PH-MARGIN*2-(totalRows-1)*GAP_ROW)/totalRows;
      activeWks.forEach((wk,wi)=>{
        const row=Math.floor(wi/2);
        const col=wi%2;
        const bx=MARGIN+col*(boxW+GAP_COL);
        const by=MARGIN+row*(boxH+GAP_ROW);
        drawWeekBox(emp,wk,bx,by,boxW,boxH);
      });
    });
    const fname=visible.length===1
      ?'PAYSLIP_'+visible[0].name.replace(/[,\s]+/g,'_')+'_'+curMonth+'_'+curYear+'.pdf'
      :'PAYSLIPS_ALL_WEEKS_'+curMonth+'_'+curYear+'.pdf';
    doc.save(fname);
    return;
  }

  // Grid mode: 2 payslips per A4 page portrait
  if(psLayout==='grid'){
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const PW=210,PH=297,m=10,cw=PW-m*2;
    const slipH=130;
    visible.forEach((emp,idx)=>{
      const pageIdx=Math.floor(idx/2);
      if(idx%2===0 && idx>0)doc.addPage();
      const yOff=m+(idx%2)*(slipH+8);
      drawPayslipOnPage(doc,emp,psWeek,m,yOff,cw,slipH);
    });
    doc.save('PAYSLIPS_'+curMonth+'_'+curYear+'.pdf');
    return;
  }
}

      doc.setFont('helvetica','normal');doc.setFontSize(7);doc.setTextColor(17,17,17);
      const vals=[
        emp.name,
        mSum(emp,['pay']),mSum(emp,['allow']),mSum(emp,['ot']),mSum(emp,['hol']),
        mSum(emp,['sss']),mSum(emp,['ph']),mSum(emp,['pag']),mSum(emp,['sssl']),
        mSum(emp,['pay','allow','ot','hol']),
        mSum(emp,['pay','allow','ot','hol'])-mSum(emp,['sss','ph','pag','sssl','pagl','abs'])
      ];
      x=m;
      vals.forEach((v,vi)=>{
        const txt=vi===0?v:(n2(v)>0?P(v):'\u2014');
        if(vi===0)doc.text(txt,x+2,y+4,{maxWidth:colW[0]-3});

        if(vi>0)doc.setDrawColor(220,220,220),doc.setLineWidth(0.1),doc.line(x,y,x,y+5.5);
        x+=colW[vi];
      });
      doc.setDrawColor(235,235,235);doc.setLineWidth(0.1);doc.line(m,y+5.5,m+cw,y+5.5);
      y+=5.5;

    // Totals row

    doc.text('TOTAL',m+2,y+4.5);

     mSum,mSum,mSum,mSum,mSum,mSum,mSum].forEach(()=>{});
    // simplified: sum each column
    const totals=colW.slice(1).map((_,ci)=>{
      const keys=[['pay'],['allow'],['ot'],['hol'],['sss'],['ph'],['pag'],['sssl'],
                  ['pay','allow','ot','hol'],

      const deducKeys=['sss','ph','pag','sssl','pagl','abs'];
      if(ci===9) return filtered.reduce((s,e)=>s+mSum(e,['pay','allow','ot','hol'])-mSum(e,deducKeys),0);

}


function exportWeeklyBreakdownPDF(selectedWk, layout){
  const mo=DB[curMonth];if(!mo)return;
  const{jsPDF}=window.jspdf;

  // Column definitions — earnings | per-day OT | deductions | totals
  const DAY_COLS=DAYS; // ['Thu','Fri','Sat','Sun','Mon','Tue','Wed']
  const colDefs=[
    {key:'name',   label:'EMPLOYEE',   w:44, align:'left'},
    {key:'pay',    label:'REG PAY',    w:21, align:'right'},
    {key:'allow',  label:'ALLOW',      w:17, align:'right'},
    {key:'hol',    label:'HOL PAY',    w:17, align:'right'},
    // per-day OT hrs — added dynamically
    ...DAY_COLS.map(d=>({key:'ot_'+d, label:d.toUpperCase(), w:11, align:'center', isOT:true})),
    {key:'ot_total',label:'OT HRS',   w:13, align:'center'},
    {key:'ot_pay', label:'OT PAY',    w:21, align:'right'},
    {key:'sss',    label:'SSS',       w:15, align:'right'},
    {key:'ph',     label:'PhilHlth',  w:15, align:'right'},
    {key:'pag',    label:'Pag-IBIG',  w:15, align:'right'},
    {key:'sssl',   label:'SSS Loan',  w:15, align:'right'},
    {key:'abs',    label:'ABS/DED',   w:15, align:'right'},
    {key:'earn',   label:'TOTAL EARN',w:23, align:'right'},
    {key:'net',    label:'NET PAY',   w:23, align:'right'},
  ];
  // Total width check — scale if needed
  const totalColW=colDefs.reduce((s,c)=>s+c.w,0);
  const PW=297,PH=210,M=8,availW=PW-M*2;
  const scale=availW/totalColW;
  const cols=colDefs.map(cd=>({...cd,w:cd.w*scale}));

  // Build row data for one employee
  function empRow(emp){
    const wk=selectedWk;
    const pay=n2(emp.cells['pay_'+wk]),allow=n2(emp.cells['allow_'+wk]);
    const hol=n2(emp.cells['hol_'+wk]);
    const sss=n2(emp.cells['sss_'+wk]),ph=n2(emp.cells['ph_'+wk]);
    const pag=n2(emp.cells['pag_'+wk]),sssl=n2(emp.cells['sssl_'+wk]);
    const pagl=n2(emp.cells['pagl_'+wk]),abs=n2(emp.cells['abs_'+wk]);
    const otHrsByDay=DAY_COLS.map(d=>n2(emp.ot?.[wk]?.[d]));
    const otHrsTotal=otHrsByDay.reduce((s,v)=>s+v,0);
    const otPay=n2(emp.cells['ot_'+wk]);
    const earn=pay+allow+otPay+hol;
    const ded=sss+ph+pag+sssl+pagl+abs;
    return {
      name:emp.name, pay,allow,
      ...Object.fromEntries(DAY_COLS.map((d,i)=>['ot_'+d, otHrsByDay[i]])),
      ot_total:otHrsTotal, ot_pay:otPay, hol,
      sss,ph,pag,sssl,abs:abs+pagl,
      earn, net:earn-ded
    };
  }

  // Draw one section (one company) starting at y
  function drawSection(doc,emps,companyName,grp,startY){
    const filtered=emps.filter(e=>!WEEKLY_EXCL.includes(e.name));
    if(!filtered.length)return startY;
    let y=startY;
    const barClr=grp==='litrad'?[26,79,207]:[6,95,70];
    const HEADER_H=8, COL_H=6.5, ROW_H=5.5, FOOT_H=6.5;

    // ── Company header bar ──
    doc.setFillColor(...barClr);doc.rect(M,y,availW,HEADER_H,'F');
    doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
    // Company name — left
    doc.setFontSize(8.5);doc.text(companyName,M+4,y+5.5);
    // Date + week — CENTERED
    doc.setFontSize(8.5);doc.setCharSpace(0.3);
    doc.text(curMonth+' '+curYear+'  \u2014  WEEK '+selectedWk+' PAYROLL',M+availW/2,y+5.5,{align:'center'});
    doc.setCharSpace(0);
    y+=HEADER_H;

    // ── Column group headers (Earnings | OT per Day | Deductions | Total) ──
    const GROUPS=[
      {label:'EARNINGS', cols:['name','pay','allow','hol'], color:[240,245,255]},
      {label:'OVERTIME (HRS)', cols:DAY_COLS.map(d=>'ot_'+d).concat(['ot_total','ot_pay']), color:[255,248,235]},
      {label:'DEDUCTIONS', cols:['sss','ph','pag','sssl','abs'], color:[255,243,243]},
      {label:'TOTALS', cols:['earn','net'], color:[235,245,235]},
    ];
    let gx=M;
    GROUPS.forEach(grp=>{
      const gCols=cols.filter(c=>grp.cols.includes(c.key));
      const gw=gCols.reduce((s,c)=>s+c.w,0);
      if(gw===0)return;
      doc.setFillColor(...grp.color);doc.rect(gx,y,gw,COL_H,'F');
      doc.setFont('helvetica','bold');doc.setFontSize(5.5);doc.setTextColor(60,60,60);
      doc.setCharSpace(0.5);doc.text(grp.label,gx+gw/2,y+COL_H-1.5,{align:'center'});doc.setCharSpace(0);
      doc.setDrawColor(200,200,200);doc.setLineWidth(0.15);
      doc.rect(gx,y,gw,COL_H,'S');
      gx+=gw;
    });
    y+=COL_H;

    // ── Column headers ──
    let cx=M;
    doc.setFillColor(232,232,232);doc.rect(M,y,availW,COL_H,'F');
    cols.forEach(col=>{
      doc.setFont('helvetica','bold');doc.setFontSize(5.2);doc.setTextColor(30,30,30);
      if(col.align==='left')doc.text(col.label,cx+2,y+COL_H-1.5);
      else doc.text(col.label,cx+col.w/2,y+COL_H-1.5,{align:'center'});
      doc.setDrawColor(200,200,200);doc.setLineWidth(0.1);doc.line(cx,y,cx,y+COL_H);
      cx+=col.w;
    });
    doc.setDrawColor(150,150,150);doc.setLineWidth(0.2);
    doc.line(M,y,M+availW,y);doc.line(M,y+COL_H,M+availW,y+COL_H);
    y+=COL_H;

    // ── Data rows ──
    const totals={};cols.forEach(c=>{if(c.key!=='name')totals[c.key]=0;});
    filtered.forEach((emp,ri)=>{
      const row=empRow(emp);
      if(ri%2===0){doc.setFillColor(250,250,252);doc.rect(M,y,availW,ROW_H,'F');}
      cx=M;
      cols.forEach(col=>{
        const val=row[col.key];
        let txt='';
        if(col.key==='name'){txt=val;}
        else if(col.isOT){txt=val>0?val.toFixed(1):'\u2014';}
        else if(col.key==='ot_total'){txt=val>0?val.toFixed(1):'\u2014';}
        else{txt=val>0?P(val):'\u2014';}
        doc.setFont('helvetica','normal');doc.setFontSize(col.key==='name'?6.5:6);
        doc.setTextColor(col.key==='net'?17:34, col.key==='net'?17:34, col.key==='net'?17:34);
        if(col.key==='net')doc.setFont('helvetica','bold');
        if(col.align==='left')doc.text(txt,cx+2,y+ROW_H-1.4,{maxWidth:col.w-3});
        else doc.text(txt,cx+col.w/2,y+ROW_H-1.4,{align:'center'});
        // track totals
        if(col.key!=='name' && typeof val==='number')totals[col.key]=(totals[col.key]||0)+val;
        doc.setDrawColor(230,230,230);doc.setLineWidth(0.08);doc.line(cx,y,cx,y+ROW_H);
        cx+=col.w;
      });
      doc.setDrawColor(230,230,230);doc.setLineWidth(0.08);doc.line(M,y+ROW_H,M+availW,y+ROW_H);
      y+=ROW_H;
    });

    // ── Totals row ──
    doc.setFillColor(220,230,255);doc.rect(M,y,availW,FOOT_H,'F');
    doc.setDrawColor(150,150,150);doc.setLineWidth(0.2);doc.line(M,y,M+availW,y);
    cx=M;
    cols.forEach(col=>{
      let txt='';
      if(col.key==='name'){txt='TOTAL';}
      else if(col.isOT){txt=totals[col.key]>0?totals[col.key].toFixed(1):'';}
      else if(col.key==='ot_total'){txt=totals[col.key]>0?totals[col.key].toFixed(1):'';}
      else{txt=totals[col.key]>0?P(totals[col.key]):'';}
      doc.setFont('helvetica','bold');doc.setFontSize(col.key==='name'?6.5:6);doc.setTextColor(17,17,17);
      if(col.align==='left')doc.text(txt,cx+2,y+FOOT_H-1.8);
      else doc.text(txt,cx+col.w/2,y+FOOT_H-1.8,{align:'center'});
      doc.setDrawColor(200,200,200);doc.setLineWidth(0.1);doc.line(cx,y,cx,y+FOOT_H);
      cx+=col.w;
    });
    doc.setDrawColor(150,150,150);doc.setLineWidth(0.2);doc.line(M,y+FOOT_H,M+availW,y+FOOT_H);
    y+=FOOT_H;
    return y;
  }

  if(layout==='combined'){
    const doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
    let y=drawSection(doc,mo.litrad,'LITRAD INC.','litrad',M)+6;
    if(y+40>PH-M){doc.addPage();y=M;}
    drawSection(doc,mo.jvt,'JVT CORPORATION','jvt',y);
    doc.save('WEEKLY_'+selectedWk+'_COMBINED_'+curMonth+'_'+curYear+'.pdf');
  } else {
    const doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
    drawSection(doc,mo.litrad,'LITRAD INC.','litrad',M);
    doc.addPage();
    drawSection(doc,mo.jvt,'JVT CORPORATION','jvt',M);
    doc.save('WEEKLY_'+selectedWk+'_'+curMonth+'_'+curYear+'.pdf');
  }
}

    let x=m;
    doc.setFillColor(232,232,232);doc.rect(m,headerY,cw,6,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(6);doc.setTextColor(17,17,17);
    cols.forEach((col,ci)=>{
      doc.text(col,x+(ci===0?2:colW[ci]/2),headerY+4.2,ci>0?{align:'center'}:{});
      if(ci>0)doc.setDrawColor(200,200,200),doc.setLineWidth(0.1),doc.line(x,headerY,x,headerY+6);
      x+=colW[ci];
    });
    doc.setDrawColor(180,180,180);doc.setLineWidth(0.15);doc.line(m,headerY+6,m+cw,headerY+6);
    let ry=headerY+6;
    emps.forEach((emp,ri)=>{
      if(ri%2===0){doc.setFillColor(250,250,250);doc.rect(m,ry,cw,ROW_H,'F');}
      doc.setFont('helvetica','normal');doc.setFontSize(6.5);doc.setTextColor(17,17,17);
      const pay=n2(emp.cells['pay_'+wk]),allow=n2(emp.cells['allow_'+wk]);
      const ot=n2(emp.cells['ot_'+wk]),hol=n2(emp.cells['hol_'+wk]);
      const sss=n2(emp.cells['sss_'+wk]),ph=n2(emp.cells['ph_'+wk]),pag=n2(emp.cells['pag_'+wk]);
      const earn=pay+allow+ot+hol,ded=sss+ph+pag+n2(emp.cells['sssl_'+wk])+n2(emp.cells['pagl_'+wk])+n2(emp.cells['abs_'+wk]);
      const vals=[emp.name,pay,ot,hol,sss,ph,pag,earn,earn-ded];
      x=m;
      vals.forEach((v,vi)=>{
        const txt=vi===0?v:(n2(v)>0?P(v):'\u2014');
        if(vi===0)doc.text(txt,x+2,ry+ROW_H-1.2,{maxWidth:colW[0]-3});
        else doc.text(txt,x+colW[vi]/2,ry+ROW_H-1.2,{align:'center'});
        if(vi>0)doc.setDrawColor(220,220,220),doc.setLineWidth(0.1),doc.line(x,ry,x,ry+ROW_H);
        x+=colW[vi];
      });
      doc.setDrawColor(235,235,235);doc.setLineWidth(0.1);doc.line(m,ry+ROW_H,m+cw,ry+ROW_H);
      ry+=ROW_H;
    });
    return ry;
  }

  const y1end=drawSection(f1,gn1,cn1,barClr1);
  y=y1end+4;
  drawSection(f2,gn2,cn2,barClr2);
}


function setSummaryPdfMode(mode){
  const btnM=document.getElementById('pdf-opt-monthly');

  // Both possible IDs for the week row picker
  const wkRow=document.getElementById('summary-week-row')||document.getElementById('week-picker');

  if(btnW){btnW.style.background=mode==='weekly'?'#111':'var(--white)';btnW.style.color=mode==='weekly'?'#fff':'var(--text2)';}

function doExportSummaryPDF(){
  // Detect mode: if weekly button has dark background, mode is weekly
  const btnW=document.getElementById('pdf-opt-weekly');
  const mode=(btnW&&(btnW.style.background==='rgb(17, 17, 17)'||btnW.style.background==='#111'))?'weekly':'monthly';
  if(mode==='monthly'){
    exportMonthlySummaryPDF();
  } else {
    const wkSel=document.getElementById('summary-week-sel');
    const layoutSel=document.getElementById('summary-layout-sel');
    const wk=wkSel?wkSel.value:'W1';
    const layout=layoutSel?layoutSel.value:'separate';
    exportWeeklyBreakdownPDF(wk, layout);
  }
}
save=function(){localStorage.setItem('pr26c_'+curYear,JSON.stringify(DB));localStorage.setItem('pr26cm_'+curYear,curMonth);};
load=function(){
  curYear=localStorage.getItem('pr26_curyear')||new Date().getFullYear().toString();
  getYearList();
  const raw=localStorage.getItem('pr26c_'+curYear)||localStorage.getItem('pr26c');
  DB=raw?JSON.parse(raw):{};
  curMonth=localStorage.getItem('pr26cm_'+curYear)||localStorage.getItem('pr26cm')||'';
  if(!Object.keys(DB).filter(k=>k!=='_empMeta').length){DB['JANUARY']=seedJan();DB['FEBRUARY']=seedFeb();curMonth='FEBRUARY';}
  if(!curMonth||!DB[curMonth])curMonth=Object.keys(DB).filter(k=>k!=='_empMeta')[0]||'';
};

load();renderAll();
</script>
