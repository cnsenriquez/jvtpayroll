<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAYROLL 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#eef1f8;--white:#fff;--border:#dde3ed;--border2:#c5cedd;
  --text:#1c2340;--text2:#5a6480;--text3:#9aa2bc;
  --blue:#1a4fcf;--blue-bg:#e8f0fe;
  --green:#065f46;--green-bg:#d1fae5;
  --red:#991b1b;--red-bg:#fee2e2;
  --orange:#92400e;--orange-bg:#fef3c7;
  --purple:#5b21b6;--purple-bg:#ede9fe;
  --teal:#0e7490;--teal-bg:#ecfeff;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:12px;min-height:100vh;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
button{cursor:pointer;font-family:inherit;}

/* ── TOPBAR ── */
#topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 16px;height:52px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 1px 8px rgba(20,40,100,.07);}
.logo{font-size:15px;font-weight:800;color:var(--blue);letter-spacing:-.3px;white-space:nowrap;}
.logo-sub{font-size:9px;color:var(--text3);letter-spacing:1.2px;text-transform:uppercase;margin-top:1px;}
.vdiv{width:1px;height:26px;background:var(--border);flex-shrink:0;}

/* PAGE TABS */
.page-tabs{display:flex;gap:2px;background:var(--bg);border-radius:8px;padding:3px;flex-shrink:0;}
.ptab{padding:5px 11px;border-radius:6px;border:none;background:none;font-size:11px;font-weight:600;color:var(--text3);transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:4px;}
.ptab:hover{color:var(--text2);}
.ptab.active{background:var(--white);color:var(--blue);box-shadow:0 1px 4px rgba(20,40,100,.12);}

/* BUTTONS */
.topbtns{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;border-radius:6px;font-size:11px;font-weight:600;border:none;transition:all .15s;white-space:nowrap;}
.btn-blue{background:var(--blue);color:#fff;}
.btn-blue:hover{background:#163fb5;}
.btn-ghost{background:var(--white);color:var(--text2);border:1px solid var(--border2);}
.btn-ghost:hover{background:var(--bg);}
.btn-green{background:var(--green-bg);color:var(--green);border:1px solid #6ee7b7;}
.btn-green:hover{background:#a7f3d0;}
.btn-red{background:var(--red-bg);color:var(--red);border:1px solid #fca5a5;}
.btn-red:hover{background:#fecaca;}

/* ── MAIN ── */
#main{padding:14px 16px 60px;}
.page-section{display:none;}
.page-section.active{display:block;}
.wrap{overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch;}
.section-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}

/* ── GROUP HEADERS ── */
.group-block{margin-bottom:18px;}
.group-head{display:flex;align-items:center;gap:8px;padding:7px 14px;border-radius:8px 8px 0 0;font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;cursor:pointer;user-select:none;border-bottom:none;position:sticky;left:0;}
.group-litrad{background:#eff6ff;color:#1e40af;border:1.5px solid #bfdbfe;border-bottom:none;}
.group-jvt{background:#ecfdf5;color:#065f46;border:1.5px solid #6ee7b7;border-bottom:none;}
.chevron{transition:transform .2s;}
.collapsed .chevron{transform:rotate(-90deg);}

/* ── PAYROLL TABLE ── */
.pt{border-collapse:collapse;background:var(--white);border:1.5px solid var(--border);border-top:none;border-radius:0 0 8px 8px;white-space:nowrap;}
.pt thead tr th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text3);padding:5px 3px;text-align:center;border-bottom:1px solid var(--border);border-right:1px solid var(--border);white-space:nowrap;}
.pt thead tr:first-child th{padding:5px 5px;font-size:9px;}
.pt thead th.nm{text-align:left;padding-left:10px;min-width:150px;max-width:150px;position:sticky;left:0;background:inherit;z-index:2;}
th.h-pay{background:#eff6ff;color:#1e40af!important;}
th.h-allow{background:#f0fdf4;color:#065f46!important;}
th.h-ot{background:#fffbeb;color:#92400e!important;}
th.h-hol{background:#fff7ed;color:#c2410c!important;}
th.h-sss{background:#fdf4ff;color:#7e22ce!important;}
th.h-ph{background:#f0f9ff;color:#0369a1!important;}
th.h-pag{background:#f0fdf4;color:#047857!important;}
th.h-sssl{background:#fef2f2;color:#991b1b!important;}
th.h-pagl{background:#fef2f2;color:#b91c1c!important;}
th.h-abs{background:#fffbeb;color:#b45309!important;}
th.h-net{background:#d1fae5;color:#065f46!important;font-size:10px!important;}
.pt tbody td{padding:0;border-right:1px solid #eef1f8;border-bottom:1px solid #f0f4f9;}
.pt tbody tr:last-child td{border-bottom:none;}
.pt tbody tr:hover td{background:#fafbff;}
td.nm{padding:0 10px;font-weight:600;font-size:11.5px;color:var(--text);white-space:nowrap;position:sticky;left:0;background:var(--white);z-index:1;border-right:1.5px solid var(--border2)!important;min-width:150px;max-width:150px;}
td.nm-inner{display:flex;align-items:center;justify-content:space-between;gap:4px;}
.emp-badge{font-size:9px;padding:1px 5px;border-radius:10px;font-weight:700;letter-spacing:.3px;flex-shrink:0;}
.badge-5d{background:#ede9fe;color:#5b21b6;}
.del-emp{background:none;border:none;color:#d1d9e8;font-size:15px;line-height:1;cursor:pointer;padding:0 2px;flex-shrink:0;}
.del-emp:hover{color:#ef4444;}
.pt td input{width:100%;border:none;background:transparent;text-align:center;padding:7px 10px;font-size:11.5px;font-family:inherit;color:var(--text);outline:none;transition:background .1s;min-width:100px;}
.pt td input:focus{background:#eef4ff;}
.pt td input.ded{color:var(--red);}
.pt td input.net-in{color:var(--green);font-weight:700;background:transparent!important;cursor:default;}
.pt td input.ot-auto{color:var(--orange);}
td.sep-l{border-left:2px solid var(--border2)!important;}
.pt tfoot td{background:#f4f7fc;border-top:2px solid var(--border2);padding:6px 5px;text-align:center;font-weight:700;font-size:11px;color:var(--text2);border-right:1px solid var(--border);}
.pt tfoot td.nm{text-align:left;font-size:10px;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;}
.pt tfoot td.tot-net{background:var(--green-bg);color:var(--green);}
.add-bar{background:var(--white);border:1.5px solid var(--border);border-top:none;border-radius:0 0 8px 8px;padding:6px 12px;display:flex;gap:8px;align-items:center;position:sticky;left:0;width:fit-content;}

/* ── OT TABLE ── */
.ot-top{display:flex;gap:12px;align-items:center;margin-bottom:14px;flex-wrap:wrap;}
.week-nav{display:flex;gap:5px;align-items:center;}
.week-nav button{background:var(--white);border:1px solid var(--border2);border-radius:6px;padding:4px 10px;font-size:12px;color:var(--text2);}
.week-lbl{font-size:13px;font-weight:700;color:var(--blue);min-width:190px;text-align:center;}
.wbtn{padding:4px 9px;border-radius:6px;font-size:11px;font-weight:600;border:1.5px solid var(--border);background:var(--white);color:var(--text3);}
.wbtn.active{border-color:var(--blue);background:var(--blue-bg);color:var(--blue);}
.ot-cards{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.oc{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:10px 14px;min-width:130px;}
.oc-l{font-size:9.5px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px;}
.oc-v{font-size:19px;font-weight:700;letter-spacing:-.4px;}
.oc-s{font-size:10px;color:var(--text3);margin-top:1px;}
.ot-g-lbl{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;padding:7px 14px;border-radius:8px 8px 0 0;margin-top:12px;}
.ot-g-litrad{background:#eff6ff;color:#1e40af;border:1.5px solid #bfdbfe;border-bottom:none;}
.ot-g-jvt{background:#ecfdf5;color:#065f46;border:1.5px solid #6ee7b7;border-bottom:none;}
.ott{border-collapse:collapse;background:var(--white);border:1.5px solid var(--border);border-top:none;white-space:nowrap;border-radius:0 0 8px 8px;}
.ott th{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text3);padding:5px 6px;text-align:center;border-bottom:1.5px solid var(--border2);border-right:1px solid var(--border);background:#f8faff;}
.ott th.nm{text-align:left;min-width:150px;background:#f8faff;}
.ott th.rc{background:#fffbeb;color:#92400e!important;min-width:72px;}
.ott th.dc{background:#f0f9ff;color:#0369a1!important;min-width:72px;}
.ott th.tc{background:#fffbeb;color:#c2410c!important;min-width:64px;}
.ott th.pc{background:#d1fae5;color:#065f46!important;min-width:88px;}
.ott td{padding:0;border-right:1px solid #eef1f8;border-bottom:1px solid #f0f4f9;}
.ott tbody tr:hover td{background:#fafbff;}
.ott td.nm{padding:6px 10px;font-weight:600;font-size:11.5px;white-space:nowrap;min-width:150px;border-right:1.5px solid var(--border2)!important;}
.ott td input{width:100%;border:none;background:transparent;text-align:center;padding:6px 8px;font-size:11.5px;font-family:inherit;color:var(--text);outline:none;transition:background .1s;min-width:72px;}
.ott td input:focus{background:#eef4ff;}
.ott td.rd input{color:var(--orange);font-weight:600;cursor:default;background:transparent;}
.ott td.dd input{color:#0369a1;}
.ott td.totd{background:#fffdf5;text-align:center;padding:5px 10px;font-weight:700;font-size:11.5px;color:var(--orange);}
.ott td.payd{background:#f0fdf4;text-align:center;padding:5px 10px;font-weight:700;font-size:11.5px;color:var(--green);}
.ott tfoot td{background:#f4f7fc;border-top:2px solid var(--border2);padding:5px 10px;text-align:center;font-weight:700;font-size:11px;color:var(--text2);border-right:1px solid var(--border);}
.ott tfoot td.nm{text-align:left;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;}
.ott tfoot td.fh{color:var(--orange);}
.ott tfoot td.fp{background:var(--green-bg);color:var(--green);}

/* ── WEEKLY SUMMARY ── */
.wsum-wrap{overflow-x:auto;padding-bottom:6px;}
.wst{border-collapse:collapse;background:var(--white);border:1.5px solid var(--border);border-radius:8px;white-space:nowrap;}
.wst th{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text3);padding:6px 8px;text-align:center;border-bottom:1.5px solid var(--border2);border-right:1px solid var(--border);background:#f8faff;}
.wst th.nm{text-align:left;min-width:150px;background:#f8faff;border-radius:8px 0 0 0;}
.wst th.wh{background:var(--blue-bg);color:var(--blue)!important;font-size:10px;}
.wst th.net-h{background:var(--green-bg);color:var(--green)!important;font-size:10px;}
.wst th.total-h{background:#1a4fcf;color:#fff!important;font-size:10px;}
.wst td{padding:0;border-right:1px solid #eef1f8;border-bottom:1px solid #f0f4f9;}
.wst tbody tr:hover td{background:#fafbff;}
.wst td.nm{padding:7px 10px;font-weight:600;font-size:11.5px;white-space:nowrap;min-width:150px;border-right:1.5px solid var(--border2)!important;}
.wst td.wv{text-align:center;padding:7px 10px;font-size:11.5px;color:var(--text2);}
.wst td.nv{text-align:center;padding:7px 10px;font-size:11.5px;font-weight:700;color:var(--green);}
.wst td.tv{text-align:center;padding:7px 10px;font-size:12px;font-weight:800;color:var(--blue);}
.wst tfoot td{background:#f0f4fb;border-top:2px solid var(--border2);padding:7px 8px;text-align:center;font-weight:700;font-size:11px;color:var(--text2);border-right:1px solid var(--border);}
.wst tfoot td.nm{text-align:left;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;}
.wst tfoot td.tot-col{background:var(--blue-bg);color:var(--blue);}
.grp-sep td{background:#f4f7fc!important;border-top:2px solid var(--border)!important;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;padding:5px 10px!important;}

/* ── LEAVE TAB ── */
.leave-header{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap;}
.leave-filter{padding:5px 11px;border-radius:6px;border:1.5px solid var(--border);background:var(--white);font-size:11.5px;font-family:inherit;color:var(--text2);outline:none;cursor:pointer;}
.leave-filter:focus{border-color:var(--blue);}
.lt{border-collapse:collapse;background:var(--white);border:1.5px solid var(--border);border-radius:8px;white-space:nowrap;}
.lt th{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text3);padding:7px 10px;text-align:left;border-bottom:1.5px solid var(--border2);border-right:1px solid var(--border);background:#f8faff;}
.lt td{padding:7px 10px;border-right:1px solid #eef1f8;border-bottom:1px solid #f0f4f9;font-size:11.5px;vertical-align:middle;}
.lt tbody tr:hover td{background:#fafbff;}
.lt tbody tr:last-child td{border-bottom:none;}
.lt td.emp-name{font-weight:600;min-width:150px;white-space:nowrap;}
.leave-type{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;letter-spacing:.3px;}
.lt-vl{background:#dbeafe;color:#1e40af;}
.lt-sl{background:#fce7f3;color:#9d174d;}
.lt-el{background:#d1fae5;color:#065f46;}
.lt-ml{background:#ede9fe;color:#5b21b6;}
.lt-unpaid{background:#fee2e2;color:#991b1b;}
.lt-other{background:#f0f4fb;color:#5a6480;}
.leave-status{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;}
.ls-approved{background:#d1fae5;color:#065f46;}
.ls-pending{background:#fef3c7;color:#92400e;}
.ls-denied{background:#fee2e2;color:#991b1b;}
.del-leave{background:none;border:none;color:#d1d9e8;font-size:14px;cursor:pointer;padding:0 3px;}
.del-leave:hover{color:#ef4444;}
.leave-balance-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:12px 16px;display:flex;gap:20px;flex-wrap:wrap;margin-bottom:14px;}
.lb-item .lb-label{font-size:9.5px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;}
.lb-item .lb-val{font-size:18px;font-weight:700;color:var(--blue);letter-spacing:-.3px;}
.lb-item .lb-sub{font-size:10px;color:var(--text3);}

/* ── PAYSLIP TAB ── */
.ps-sel{padding:5px 26px 5px 10px;border:1.5px solid var(--border2);border-radius:7px;font-size:12px;font-weight:700;font-family:inherit;color:var(--text);background:var(--white);outline:none;cursor:pointer;appearance:none;-webkit-appearance:none;}
.ps-sel:focus{border-color:var(--blue);}
.ps-controls{display:flex;gap:14px;align-items:center;flex-wrap:wrap;margin-bottom:18px;padding:10px 14px;background:var(--white);border:1px solid var(--border);border-radius:10px;}
.ps-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px;}
.payslip-card{background:#fff;border:1px solid #bbb;font-family:'DM Sans',sans-serif;box-shadow:0 2px 8px rgba(0,0,0,.07);}
.ps-header{background:#fff;padding:14px 18px 10px;text-align:center;border-bottom:2px solid #111;}
.ps-company{font-size:14px;font-weight:900;color:#111;letter-spacing:.5px;text-transform:uppercase;}
.ps-company-sub{font-size:8px;font-weight:700;color:#333;letter-spacing:2.5px;text-transform:uppercase;margin:2px 0;}
.ps-address{font-size:7.5px;color:#555;line-height:1.6;text-transform:uppercase;}
.ps-body{padding:11px 15px 10px;}
.ps-desc-label{font-size:7px;color:#999;letter-spacing:3px;text-transform:uppercase;padding-bottom:4px;border-bottom:1px solid #ddd;margin-bottom:8px;}
.ps-info-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px 10px;margin-bottom:6px;}
.ps-info-label{font-size:7.5px;color:#999;text-transform:uppercase;letter-spacing:.3px;margin-bottom:1px;}
.ps-info-val{font-size:10.5px;font-weight:700;color:#111;}
.ps-editable{font-size:10.5px;font-weight:700;color:#111;border:none;border-bottom:1px dashed #bbb;background:transparent;outline:none;width:100%;font-family:inherit;padding:0;cursor:text;}
.ps-editable:focus{border-bottom-color:#111;background:#f5f5f5;padding:1px 3px;}
.ps-tables-row{display:grid;grid-template-columns:1fr 1fr;margin-bottom:7px;border:1px solid #bbb;}
.ps-table-wrap:first-child{border-right:1px solid #bbb;}
.ps-table{width:100%;border-collapse:collapse;font-size:10px;}
.ps-th-earn,.ps-th-ded{background:#e8e8e8;color:#111;font-size:7.5px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;padding:5px 8px;border-bottom:1px solid #bbb;}
.ps-td-lbl{padding:3px 8px;color:#222;border-bottom:1px solid #ebebeb;}
.ps-td-amt{padding:3px 8px;text-align:right;color:#555;font-weight:500;border-bottom:1px solid #ebebeb;}
.ps-total-earn td,.ps-total-ded td{background:#e8e8e8;color:#111;font-weight:800;font-size:10.5px;padding:5px 8px;border-top:1px solid #bbb;}
.ps-total-earn td:last-child,.ps-total-ded td:last-child{text-align:right;}
.ps-net-box{background:#111;padding:9px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.ps-net-label{font-size:9px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:1px;}
.ps-net-amt{font-size:18px;font-weight:800;color:#fff;}
.ps-words{font-size:8px;color:#444;font-style:italic;background:#f5f5f5;padding:5px 10px;border-left:3px solid #999;margin-bottom:10px;}
.ps-sigs{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding-top:8px;border-top:1px dashed #ccc;}
.ps-sig-line{border-bottom:1.5px solid #111;height:24px;margin-bottom:4px;}
.ps-sig-name{font-size:9.5px;font-weight:800;color:#111;text-align:center;}
.ps-sig-title{font-size:8px;color:#777;text-align:center;}
.ps-pdf-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;background:#111;color:#fff;border:none;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s;border-radius:5px;}
.ps-pdf-btn:hover{background:#333;}

/* ── PDF LAYOUT TOGGLE ── */
.pdf-layout-toggle{display:none;align-items:center;border-left:1px solid var(--border2);}
.pdf-layout-btn{padding:6px 11px;border:none;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;background:var(--white);color:var(--text2);display:flex;align-items:center;gap:4px;white-space:nowrap;transition:all .15s;}
.pdf-layout-btn:hover{background:var(--bg);}
.pdf-layout-btn.active{background:var(--blue);color:#fff;}
.pdf-layout-sep-line{width:1px;height:20px;background:var(--border2);}

/* ── STATUS BAR ── */
#sbar{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);padding:6px 16px;display:flex;gap:18px;align-items:center;font-size:11px;color:var(--text3);box-shadow:0 -1px 8px rgba(20,40,100,.06);z-index:50;}
#sbar .lbl{font-weight:700;color:var(--text2);}
#sbar .val{font-weight:700;color:var(--blue);}
#sbar .val-g{color:var(--green);}
#sbar .autosave{margin-left:auto;display:flex;align-items:center;gap:4px;}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(15,25,60,.45);backdrop-filter:blur(5px);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px;}
.modal{background:var(--white);border-radius:14px;padding:22px;max-width:400px;width:100%;box-shadow:0 24px 60px rgba(15,25,60,.22);}
.modal h3{font-size:15px;font-weight:700;color:var(--text);margin-bottom:12px;}
.modal p{font-size:13px;color:var(--text2);margin-bottom:16px;}
.modal label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:3px;}
.modal input,.modal select{width:100%;border:1.5px solid var(--border);border-radius:7px;padding:8px 10px;font-size:13px;font-family:inherit;color:var(--text);outline:none;margin-bottom:10px;background:var(--white);}
.modal input:focus,.modal select:focus{border-color:var(--blue);}
.modal-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

<script>
const SECTIONS=[
  {k:'pay',  l:'REGULAR PAY',         cls:'h-pay',  ded:false},
  {k:'allow',l:'WEEKLY ALLOWANCE',    cls:'h-allow',ded:false},
  {k:'ot',   l:'REGULAR OVERTIME',    cls:'h-ot',   ded:false},
  {k:'hol',  l:'C/A - HOLIDAY PAY',   cls:'h-hol',  ded:false},
  {k:'sss',  l:'SSS',                 cls:'h-sss',  ded:true },
  {k:'ph',   l:'PHILHEALTH',          cls:'h-ph',   ded:true },
  {k:'pag',  l:'PAG-IBIG',            cls:'h-pag',  ded:true },
  {k:'sssl', l:'SSS LOAN',            cls:'h-sssl', ded:true },
  {k:'pagl', l:'PAG-IBIG LOAN',       cls:'h-pagl', ded:true },
  {k:'abs',  l:'ABSENCES/DEDS',       cls:'h-abs',  ded:true },
];
const WKS=['W1','W2','W3','W4','W5'];
const DAYS=['Thu','Fri','Sat','Sun','Mon','Tue','Wed'];
const MO=['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];
const LEAVE_TYPES={VL:{l:'Vacation Leave',cls:'lt-vl'},SL:{l:'Sick Leave',cls:'lt-sl'},EL:{l:'Emergency Leave',cls:'lt-el'},ML:{l:'Maternity/Paternity',cls:'lt-ml'},UNPAID:{l:'Unpaid Leave',cls:'lt-unpaid'},OTHER:{l:'Other',cls:'lt-other'}};
const LEAVE_ALLOC={'PEREZ, JOEY':6,'ALAMER, REY':6,'GONZAGA, ROMEO':6,'ORTIZ, JENNY':12};
function getLeaveAlloc(n){return LEAVE_ALLOC[n]||5;}
function getLeaveUsed(n){let u=0;Object.values(DB).forEach(mo=>{if(!mo.leaves)return;mo.leaves.filter(l=>l.emp===n&&l.status==='approved').forEach(l=>u+=n2(l.days));});return u;}

let DB={}, curMonth='', curPage='payroll', otWkIdx=0;
const WEEKLY_EXCL=['GONZAGA, ROMEO','OFIANA, MICTHEL'];
let pendingGroup='', confirmCb=null;

function save(){localStorage.setItem('pr26c',JSON.stringify(DB));localStorage.setItem('pr26cm',curMonth);}
function load(){
  const r=localStorage.getItem('pr26c');
  DB=r?JSON.parse(r):{};
  curMonth=localStorage.getItem('pr26cm')||'';
  if(!Object.keys(DB).filter(k=>k!=='_empMeta').length){DB['JANUARY']=seedJan();DB['FEBRUARY']=seedFeb();curMonth='FEBRUARY';}
  if(!curMonth||!DB[curMonth]) curMonth=Object.keys(DB).filter(k=>k!=='_empMeta')[0]||'';
}

const n2=v=>{const x=parseFloat(String(v||'').replace(/,/g,''));return isNaN(x)?0:x;};
const P=v=>{const x=n2(v);return x?x.toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2}):'';}
const PF=v=>'₱'+n2(v).toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2});

function calcOTPay(emp,wk){const wd=emp.workDays||6;const dr=n2(emp.dailyRate)>0?n2(emp.dailyRate):(n2(emp.cells['pay_'+wk])+n2(emp.cells['allow_'+wk]))/wd;if(!dr)return 0;const hr=dr/8;const hrs=DAYS.reduce((s,d)=>s+n2(emp.ot?.[wk]?.[d]),0);return hr*1.25*hrs;}
function getEffDailyRate(emp,wk){const wd=emp.workDays||6;return n2(emp.dailyRate)>0?n2(emp.dailyRate):(n2(emp.cells['pay_'+wk])+n2(emp.cells['allow_'+wk]))/wd;}
function getOTHrs(emp,wk){return DAYS.reduce((s,d)=>s+n2(emp.ot?.[wk]?.[d]),0);}
function calcNet(emp,wk){const e=['pay','allow','ot','hol'].reduce((s,k)=>s+n2(emp.cells[k+'_'+wk]),0);const d=['sss','ph','pag','sssl','pagl','abs'].reduce((s,k)=>s+n2(emp.cells[k+'_'+wk]),0);return e-d;}
function ensureOT(emp){if(!emp.ot)emp.ot={};WKS.forEach(w=>{if(!emp.ot[w])emp.ot[w]={};DAYS.forEach(d=>{if(emp.ot[w][d]===undefined)emp.ot[w][d]='';});});}
function mkEmp(name,vals={},workDays=6,dailyRate=null){const e={name,workDays,dailyRate,cells:{},ot:{},leave:[]};SECTIONS.forEach(s=>WKS.forEach(w=>{e.cells[s.k+'_'+w]=vals[s.k+'_'+w]??'';}));WKS.forEach(w=>{e.ot[w]={};DAYS.forEach(d=>{e.ot[w][d]='';});});return e;}

    mkEmp('GONZAGA, ROMEO',{pay_W1:3948,pay_W2:3948,pay_W3:3948,pay_W4:3948,pay_W5:3948,allow_W1:234,allow_W2:234,allow_W3:234,allow_W4:234,allow_W5:234,ot_W1:1742.5,ot_W2:1960.31,ot_W3:2777.11,hol_W3:313.5},6),
    mkEmp('ORTIZ, JENNY',{pay_W1:4000,pay_W2:4000,pay_W3:4000,pay_W4:4000,pay_W5:4000,ot_W1:1500,ot_W2:1625,ot_W3:1500,sss_W2:337.5,sss_W4:337.5,ph_W2:75,ph_W4:75,pag_W2:100,pag_W4:100},5),
    mkEmp('PEREZ, JOEY',{pay_W1:3948,pay_W2:3948,pay_W3:3948,pay_W4:3948,pay_W5:3948,allow_W1:690,allow_W2:690,allow_W3:690,allow_W4:690,allow_W5:690,ot_W1:1449.38,ot_W2:966.25,hol_W3:232,sss_W2:236.25,sss_W4:236.25,ph_W2:75,ph_W4:75,pag_W2:100,pag_W4:100},6),
    mkEmp('BALDOMARO, DANILO',{pay_W1:3948,pay_W2:3948,pay_W3:3948,pay_W4:3948,pay_W5:3948,ot_W1:2313.28,ot_W2:976.72,ot_W3:2159.06,hol_W3:197},6),
    mkEmp('BATTILER, CHITO',{pay_W1:3948,pay_W2:3948,pay_W3:3948,pay_W4:3948,pay_W5:3948,ot_W1:1490.78,ot_W2:1182.34,ot_W3:1028.13,abs_W1:1316,abs_W3:658},6),
    mkEmp('GABIJAN, RONALD',{pay_W1:3948,pay_W2:3948,pay_W3:3948,pay_W4:3948,pay_W5:3948,ot_W1:2775.94,ot_W2:1182.34,ot_W3:2159.06,hol_W3:197},6),
  ];
  const J=[
    mkEmp('BABIERA, JOVAN',{pay_W1:3948,pay_W2:3948,pay_W3:3948,pay_W4:3948,pay_W5:3948,allow_W1:378,allow_W2:378,allow_W3:378,allow_W4:378,allow_W5:378,ot_W1:1468.59,ot_W2:903.75,ot_W3:2824.22,hol_W3:217,sss_W1:225,sss_W2:225,sss_W3:225,sss_W4:225,ph_W1:106.25,ph_W2:106.25,ph_W3:106.25,ph_W4:106.25,pag_W1:50,pag_W2:50,pag_W3:50,pag_W4:50,abs_W2:500},6,723),
    mkEmp('ENRIQUEZ, CRISTIAN',{pay_W1:4320,pay_W2:4320,pay_W3:4320,pay_W4:4320,pay_W5:4320,ot_W1:225,ot_W2:562.5,ot_W3:450,sss_W1:225,sss_W2:225,sss_W3:225,sss_W4:225,ph_W1:112.5,ph_W2:112.5,ph_W3:112.5,ph_W4:112.5,pag_W1:50,pag_W2:50,pag_W3:50,pag_W4:50},6),
    mkEmp('GABIJAN, JAPHET',{pay_W1:3948,pay_W2:3948,pay_W3:3948,pay_W4:3948,pay_W5:3948,ot_W1:2056.25,ot_W2:1850.63,ot_W3:2261.88,hol_W3:197},6),
    mkEmp('GADITANO, BENJONES',{pay_W1:3290,pay_W2:3290,pay_W3:3290,pay_W4:3290,pay_W5:3290,ot_W1:565.47,ot_W2:565.47,ot_W3:308.44,pag_W1:50,pag_W2:50,pag_W3:50,pag_W4:50},5),
    mkEmp('MOISES, CHRISTIAN',{pay_W1:3948,pay_W2:3948,pay_W3:3948,pay_W4:3948,pay_W5:3948,ot_W1:3032.97,ot_W2:1336.56,ot_W3:2570.31,hol_W3:197,sss_W1:212.5,sss_W2:212.5,sss_W3:212.5,sss_W4:212.5,ph_W1:106.25,ph_W2:106.25,ph_W3:106.25,ph_W4:106.25,pag_W1:50,pag_W2:50,pag_W3:50,pag_W4:50},6),
    mkEmp('OFIANA, MICTHEL',{pay_W1:4500,pay_W2:4500,pay_W3:4500,pay_W4:4500,pay_W5:4500},5),
    mkEmp('SARCILLA, CHARLIE',{pay_W1:3948,pay_W2:3948,pay_W3:3948,pay_W4:3948,pay_W5:3948,ot_W1:3135.78,ot_W2:1850.63,ot_W3:2570.31,hol_W3:197,sss_W1:212.5,sss_W2:212.5,sss_W3:212.5,sss_W4:212.5,ph_W1:106.25,ph_W2:106.25,ph_W3:106.25,ph_W4:106.25,pag_W1:50,pag_W2:50,pag_W3:50,pag_W4:50},6),
    mkEmp('CASPE, MOSES',{pay_W1:3948,pay_W2:3948,pay_W3:3948,pay_W4:3948,pay_W5:3948,ot_W1:411.25,ot_W2:514.06,ot_W3:411.25,sss_W1:212.5,sss_W2:212.5,sss_W3:212.5,sss_W4:212.5,ph_W1:106.25,ph_W2:106.25,ph_W3:106.25,ph_W4:106.25,pag_W1:50,pag_W2:50,pag_W3:50,pag_W4:50},6),
  ];
  return {litrad:L,jvt:J,leaves:[]};
}
function seedJan(){
  const mo=seedFeb();
  const clr=['ot','hol','abs','sssl','pagl'];
  [...mo.litrad,...mo.jvt].forEach(e=>{clr.forEach(k=>WKS.forEach(w=>{e.cells[k+'_'+w]=''}));WKS.forEach(w=>{DAYS.forEach(d=>{e.ot[w][d]='';});});});
  mo.litrad[0].cells['sssl_W1']=740.93;mo.litrad[0].cells['sssl_W3']=740.93;
  mo.litrad[3].cells['sssl_W1']=694.71;mo.litrad[3].cells['sssl_W3']=694.71;
  return mo;
}

const PAGES=['payroll','ot','weekly','leave','payslip'];
function switchPage(p){
  curPage=p;
  PAGES.forEach(x=>{
    document.getElementById('page-'+x).classList.toggle('active',x===p);
    document.getElementById('ptab-'+x).classList.toggle('active',x===p);
  });
  if(p==='ot') renderOT();
  else if(p==='weekly') renderWeekly();
  else if(p==='leave') renderLeave();
  else if(p==='payslip') renderPayslip();
}

function renderAll(){
  renderYearTabs();
  renderTabs();
  renderPayroll();
  const p=curPage;
  if(p==='ot') renderOT();
  else if(p==='weekly') renderWeekly();
  else if(p==='leave') renderLeave();
  else if(p==='payslip') renderPayslip();
  updateSbar();
}

function renderYearTabs(){
  const sel=document.getElementById('year-select');
  if(!sel)return;
  const ylist=getYearList();
  sel.innerHTML=ylist.map(y=>`<option value="${y}"${y===curYear?' selected':''}>${y}</option>`).join('');
  document.getElementById('logo-year').textContent='JVT CORPORATION';
  const ls=document.getElementById('logo-sub-year');if(ls)ls.textContent='PAYROLL SYSTEM \u00b7 '+curYear;
}

function renderTabs(){
  const sel=document.getElementById('month-select');
  if(!sel)return;
  const s=Object.keys(DB).filter(k=>k!=='_empMeta').sort((a,b)=>{const ai=MO.indexOf(a.toUpperCase()),bi=MO.indexOf(b.toUpperCase());return(ai<0?99:ai)-(bi<0?99:bi);});
  sel.innerHTML=s.map(m=>`<option value="${m}"${m===curMonth?' selected':''}>${m}</option>`).join('');
}
function switchMonth(m){curMonth=m;otWkIdx=0;save();renderAll();}

function renderPayroll(){
  const area=document.getElementById('payroll-area');

const EMP_META_DEFAULT={designation:'WORKER',department:'OPERATIONS'};
function getEmpMeta(name){return(DB._empMeta&&DB._empMeta[name])||{...EMP_META_DEFAULT};}
function setEmpMeta(name,field,val){
  if(!DB._empMeta)DB._empMeta={};
  if(!DB._empMeta[name])DB._empMeta[name]={...EMP_META_DEFAULT};
  DB._empMeta[name][field]=val;save();
}
function numToWords(n){
  const ones=['','ONE','TWO','THREE','FOUR','FIVE','SIX','SEVEN','EIGHT','NINE','TEN','ELEVEN','TWELVE','THIRTEEN','FOURTEEN','FIFTEEN','SIXTEEN','SEVENTEEN','EIGHTEEN','NINETEEN'];
  const tens=['','','TWENTY','THIRTY','FORTY','FIFTY','SIXTY','SEVENTY','EIGHTY','NINETY'];
  function w(num){if(num===0)return'';if(num<20)return ones[num]+' ';if(num<100)return tens[Math.floor(num/10)]+' '+(num%10?ones[num%10]+' ':'');return ones[Math.floor(num/100)]+' HUNDRED '+(num%100?w(num%100):'');}
  const cents=Math.round((n%1)*100),pesos=Math.floor(n);
  let result='';
  if(pesos>0){if(pesos>=1000000)result+=w(Math.floor(pesos/1000000))+'MILLION ';if(pesos>=1000)result+=w(Math.floor((pesos%1000000)/1000))+'THOUSAND ';result+=w(pesos%1000);result+='PESOS';}
  if(cents>0)result+=' AND '+w(cents)+'CENTAVOS';
  if(pesos===0&&cents===0)result='ZERO PESOS';
  return result.trim();
}

function exportAllPayslipsPDF(){

  const visible=psGroup==='litrad'?allEmps.filter(e=>e._grp==='LITRAD'):psGroup==='jvt'?allEmps.filter(e=>e._grp==='JVT'):allEmps;
  visible.forEach((emp,idx)=>{
    if(idx>0)doc.addPage();
    const wk=psWeek,meta=getEmpMeta(emp.name);
    const pay=n2(emp.cells['pay_'+wk]),allow=n2(emp.cells['allow_'+wk]),ot=n2(emp.cells['ot_'+wk]),hol=n2(emp.cells['hol_'+wk]);

    const totalEarn=pay+allow+ot+hol,totalDed=sss+ph+pag+sssl+pagl+abs,net=totalEarn-totalDed;
    const pw=210,m=20,cw=pw-m*2;let y=m;
    doc.setFillColor(255,255,255);doc.setDrawColor(17,17,17);doc.setLineWidth(0.5);doc.rect(m,y,cw,22);
    doc.setFont('helvetica','bold');doc.setFontSize(13);doc.setTextColor(17,17,17);
    doc.text(emp._grp==='LITRAD'?'LITRAD INC.':'JVT CORPORATION',pw/2,y+8,{align:'center'});
    doc.setFontSize(8);doc.text('PAYROLL SLIP',pw/2,y+13,{align:'center'});
    doc.setFont('helvetica','normal');doc.setFontSize(7);
    doc.text('PAYSLIP - '+curMonth+' '+curYear+' - WEEK '+(WKS.indexOf(wk)+1),pw/2,y+18,{align:'center'});
    y+=26;
    doc.setFillColor(240,240,240);doc.rect(m,y,cw,7,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(7);doc.setTextColor(100,100,100);
    doc.text('EMPLOYEE',m+3,y+5);doc.text('DESIGNATION',m+cw/3+3,y+5);doc.text('DEPARTMENT',m+cw*2/3+3,y+5);
    y+=7;doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(17,17,17);
    doc.text(emp.name,m+3,y+5);doc.text(meta.designation,m+cw/3+3,y+5);doc.text(meta.department,m+cw*2/3+3,y+5);y+=10;
    const halfW=(cw-2)/2;
    doc.setFillColor(232,232,232);doc.rect(m,y,halfW,7,'F');doc.rect(m+halfW+2,y,halfW,7,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(17,17,17);
    doc.text('EARNINGS',m+3,y+5);doc.text('DEDUCTIONS',m+halfW+5,y+5);y+=7;
    const earnItems=[[' Regular Pay',pay],[' Allowance',allow],[' Overtime Pay',ot],[' Holiday Pay',hol]].filter(r=>r[1]>0);
    const dedItems=[[' SSS',sss],[' PhilHealth',ph],[' Pag-IBIG',pag],[' SSS Loan',sssl],[' Pag-IBIG Loan',pagl],[' Absences',abs]].filter(r=>r[1]>0);
    const maxRows=Math.max(earnItems.length,dedItems.length,1);
    for(let i=0;i<maxRows;i++){
      doc.setFont('helvetica','normal');doc.setFontSize(8.5);doc.setTextColor(34,34,34);

function askDeleteMonth(){

// WEEKLY BREAKDOWN PDF  —  Redesigned with per-day OT
// ══════════════════════════════════════════════════
function exportWeeklyBreakdownPDF(selectedWk){
  const mo=DB[curMonth]; if(!mo) return;
  const {jsPDF}=window.jspdf;
  const isCombined = summaryPdfLayout==='combined';
  const doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  const PW=297,PH=210,M=8,CW=281; // CW = PW - M*2

  const wkIdx=WKS.indexOf(selectedWk||'W1');
  const wk=WKS[wkIdx];
  const wkDates=getWeekDates(wkIdx);
  const wkLabel='WEEK '+(wkIdx+1)+' ('+wk+') — '+curMonth+' '+curYear;

  // ── col widths — total must equal CW=281 ──
  // emp=38,pay=17,allow=14, 7xday=9each=63, othrs=12,otpay=17,hol=14,
  // sss=12,ph=14,pag=11,sssl=12,pagl=12,abs=11,dedtot=15,net=19  => 281
  const W={emp:38,pay:17,allow:14,day:9,othrs:12,otpay:17,hol:14,
           sss:12,ph:14,pag:11,sssl:12,pagl:12,abs:11,dedtot:15,net:19};

  // build column array with pre-computed x positions
  function buildCols(){
    const cols=[];
    let x=M;
    const add=(key,label,w,clr,bg,bold)=>{
      cols.push({key,label,w,x,clr:clr||[50,60,90],bg:bg||[248,250,255],bold:!!bold});
      x+=w;
    };
    add('name','EMPLOYEE',W.emp,[20,30,70],[243,246,255]);
    add('pay','REG PAY',W.pay,[40,70,160],[235,241,255]);
    add('allow','ALLOW',W.allow,[40,70,160],[235,241,255]);
    DAYS.forEach((d,di)=>{
      const lbl=d+'\n'+(wkDates[di]?wkDates[di].date:'');
      add('ot_'+d,lbl,W.day,[160,80,5],[255,248,235]);
    });
    add('otHrs','OT HRS',W.othrs,[160,80,5],[255,243,220],true);
    add('otPay','OT PAY',W.otpay,[120,55,5],[255,237,200],true);
    add('hol','HOLIDAY',W.hol,[30,100,55],[235,250,240]);
    add('sss','SSS',W.sss,[140,25,25],[255,240,240]);
    add('ph','PHILHEALTH',W.ph,[10,90,155],[235,248,255]);
    add('pag','PAG-IBIG',W.pag,[5,110,75],[235,252,244]);
    add('sssl','SSS LN',W.sssl,[150,25,25],[255,238,238]);
    add('pagl','PAGIBIG LN',W.pagl,[160,25,25],[255,235,235]);
    add('abs','CA/ABS',W.abs,[155,80,5],[255,248,230]);
    add('dedTot','TOTAL DED',W.dedtot,[150,20,20],[255,228,228],true);
    add('net','NET PAY',W.net,[5,100,55],[215,250,230],true);
    return cols;
  }

  function drawGroup(emps,groupName,companyName,startY,maxH){
    const filtered=emps.filter(e=>!WEEKLY_EXCL.includes(e.name));
    const COLS=buildCols();
    const isLitrad=groupName==='litrad';
    let y=startY;

    // ── Banner ──
    const BH=10;
    const bannerClr=isLitrad?[15,55,185]:[4,80,55];
    const accentClr=isLitrad?[90,130,255]:[50,190,130];
    doc.setFillColor(...bannerClr); doc.rect(M,y,CW,BH,'F');
    doc.setFillColor(...accentClr); doc.rect(M,y,3,BH,'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(255,255,255);
    doc.text(companyName, M+6, y+6.5);
    doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(...accentClr);
    doc.text(wkLabel, PW-M-2, y+4, {align:'right'});
    doc.setFont('helvetica','normal'); doc.setFontSize(6); doc.setTextColor(190,205,255);
    doc.text(filtered.length+' employees', PW-M-2, y+8.5, {align:'right'});
    y+=BH;

    // ── Span header row ──
    const SH=4.5;
    // Income span: pay,allow,7 day cols,othrs,otpay,hol
    const incKeys=['pay','allow',...DAYS.map(d=>'ot_'+d),'otHrs','otPay','hol'];
    const incCols=COLS.filter(c=>incKeys.includes(c.key));
    const incX=incCols[0].x, incW=incCols.reduce((s,c)=>s+c.w,0);
    doc.setFillColor(255,246,220); doc.rect(incX,y,incW,SH,'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(5.5); doc.setTextColor(150,75,5);
    doc.text('INCOME & OVERTIME',incX+incW/2,y+3.2,{align:'center'});

    const dedKeys=['sss','ph','pag','sssl','pagl','abs','dedTot'];
    const dedCols=COLS.filter(c=>dedKeys.includes(c.key));
    const dedX=dedCols[0].x, dedW=dedCols.reduce((s,c)=>s+c.w,0);
    doc.setFillColor(255,235,235); doc.rect(dedX,y,dedW,SH,'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(5.5); doc.setTextColor(145,18,18);
    doc.text('CONTRIBUTIONS & DEDUCTIONS',dedX+dedW/2,y+3.2,{align:'center'});

    const netC=COLS.find(c=>c.key==='net');
    doc.setFillColor(210,245,225); doc.rect(netC.x,y,netC.w,SH,'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(5.5); doc.setTextColor(5,100,55);
    doc.text('NET',netC.x+netC.w/2,y+3.2,{align:'center'});

    // name col span bg
    const nameC=COLS[0];
    doc.setFillColor(240,243,252); doc.rect(nameC.x,y,nameC.w,SH,'F');
    doc.setDrawColor(205,215,235); doc.setLineWidth(0.1); doc.rect(M,y,CW,SH,'S');
    y+=SH;

    // ── Column headers ──
    const CH=7;
    COLS.forEach(col=>{
      doc.setFillColor(...col.bg);
      doc.setDrawColor(200,210,230); doc.setLineWidth(0.12);
      doc.rect(col.x,y,col.w,CH,'FD');
      doc.setFont('helvetica','bold'); doc.setFontSize(4.8); doc.setTextColor(...col.clr);
      if(col.label.indexOf('\n')>=0){
        const parts=col.label.split('\n');
        doc.text(parts[0],col.x+col.w/2,y+2.6,{align:'center'});
        doc.setFont('helvetica','normal'); doc.setFontSize(4.2);
        doc.text(parts[1],col.x+col.w/2,y+5.4,{align:'center'});
      } else {
        doc.text(col.label, col.key==='name'?col.x+1.5:col.x+col.w/2, y+4.3,
          {align:col.key==='name'?'left':'center'});
      }
    });
    y+=CH;

    // ── Rows ──
    const avail=maxH-BH-SH-CH-7-4;
    const RH=Math.min(6, Math.max(4.5, avail/Math.max(filtered.length,1)));
    const FS=Math.min(6, RH*0.88);
    const cy=c=>y+RH/2+FS*0.2; // text y center

    // totals accumulators
    const T={pay:0,allow:0,otHrs:0,otPay:0,hol:0,sss:0,ph:0,pag:0,sssl:0,pagl:0,abs:0,dedTot:0,net:0};
    DAYS.forEach(d=>{ T['ot_'+d]=0; });

    filtered.forEach((emp,ri)=>{
      ensureOT(emp);
      const pay   =n2(emp.cells['pay_'+wk]);
      const allow =n2(emp.cells['allow_'+wk]);
      const otHrs =getOTHrs(emp,wk);
      const otPay =n2(emp.cells['ot_'+wk]);
      const hol   =n2(emp.cells['hol_'+wk]);
      const sss   =n2(emp.cells['sss_'+wk]);
      const ph2   =n2(emp.cells['ph_'+wk]);
      const pag   =n2(emp.cells['pag_'+wk]);
      const sssl  =n2(emp.cells['sssl_'+wk]);
      const pagl  =n2(emp.cells['pagl_'+wk]);
      const abs   =n2(emp.cells['abs_'+wk]);
      const dedTot=sss+ph2+pag+sssl+pagl+abs;
      const net   =(pay+allow+otPay+hol)-dedTot;
      const dayH  ={};
      DAYS.forEach(d=>{ dayH[d]=n2(emp.ot[wk][d]); });

      T.pay+=pay; T.allow+=allow; T.otHrs+=otHrs; T.otPay+=otPay;
      T.hol+=hol; T.sss+=sss; T.ph+=ph2; T.pag+=pag;
      T.sssl+=sssl; T.pagl+=pagl; T.abs+=abs; T.dedTot+=dedTot; T.net+=net;
      DAYS.forEach(d=>{ T['ot_'+d]+=dayH[d]; });

      // row background
      doc.setFillColor(...(ri%2===0?[252,253,255]:[246,248,254]));
      doc.rect(M,y,CW,RH,'F');

      COLS.forEach(col=>{
        doc.setDrawColor(222,228,242); doc.setLineWidth(0.08);
        doc.rect(col.x,y,col.w,RH,'S');

        const rx=col.x+col.w-1.2, ty=cy();

        if(col.key==='name'){
          doc.setFont('helvetica','bold'); doc.setFontSize(FS); doc.setTextColor(20,30,70);
          const nm=emp.name; doc.text(nm.length>20?nm.slice(0,19)+'\u2026':nm, col.x+1.5, ty);
          return;
        }

        if(col.key.startsWith('ot_')){
          const d=col.key.slice(3), v=dayH[d];
          if(v>0){
            doc.setFillColor(255,242,210); doc.rect(col.x,y,col.w,RH,'F');
            doc.setDrawColor(222,228,242); doc.setLineWidth(0.08); doc.rect(col.x,y,col.w,RH,'S');
            doc.setFont('helvetica','bold'); doc.setFontSize(FS); doc.setTextColor(150,75,5);
            doc.text(v.toFixed(1),rx,ty,{align:'right'});
          } else {
            doc.setFont('helvetica','normal'); doc.setFontSize(FS-0.8); doc.setTextColor(205,215,230);
            doc.text('\u2013',col.x+col.w/2,ty,{align:'center'});
          }
          return;
        }

        let val=0, txt='', bold=col.bold, clr=col.clr;
        if(col.key==='pay'     ){val=pay;   txt=val?P(val):''; clr=val?[35,60,145]:[205,215,230];}
        else if(col.key==='allow'   ){val=allow; txt=val?P(val):''; clr=val?[35,60,145]:[205,215,230];}
        else if(col.key==='otHrs'   ){val=otHrs; txt=val?val.toFixed(1):''; clr=val?[150,75,5]:[205,215,230];}
        else if(col.key==='otPay'   ){val=otPay; txt=val?P(val):''; clr=val?[120,50,5]:[205,215,230];}
        else if(col.key==='hol'     ){val=hol;   txt=val?P(val):''; clr=val?[25,105,65]:[205,215,230];}
        else if(col.key==='sss'     ){val=sss;   txt=val?P(val):''; clr=val?[140,20,20]:[205,215,230];}
        else if(col.key==='ph'      ){val=ph2;   txt=val?P(val):''; clr=val?[8,88,150]:[205,215,230];}
        else if(col.key==='pag'     ){val=pag;   txt=val?P(val):''; clr=val?[5,108,68]:[205,215,230];}
        else if(col.key==='sssl'    ){val=sssl;  txt=val?P(val):''; clr=val?[145,20,20]:[205,215,230];}
        else if(col.key==='pagl'    ){val=pagl;  txt=val?P(val):''; clr=val?[155,20,20]:[205,215,230];}
        else if(col.key==='abs'     ){val=abs;   txt=val?P(val):''; clr=val?[150,75,5]:[205,215,230];}
        else if(col.key==='dedTot'  ){
          val=dedTot;
          if(val>0){ doc.setFillColor(255,228,228); doc.rect(col.x,y,col.w,RH,'F');
            doc.setDrawColor(222,228,242); doc.setLineWidth(0.08); doc.rect(col.x,y,col.w,RH,'S'); }
          doc.setFont('helvetica','bold'); doc.setFontSize(FS); doc.setTextColor(...(val?[145,18,18]:[205,215,230]));
          doc.text(val?P(val):'\u2013',rx,ty,{align:'right'}); return;
        }
        else if(col.key==='net'){
          const bg=net>=0?[212,248,228]:[255,225,225];
          doc.setFillColor(...bg); doc.rect(col.x,y,col.w,RH,'F');
          doc.setDrawColor(222,228,242); doc.setLineWidth(0.08); doc.rect(col.x,y,col.w,RH,'S');
          doc.setFont('helvetica','bold'); doc.setFontSize(FS+0.3); doc.setTextColor(...(net>=0?[5,95,52]:[170,18,18]));
          doc.text(P(net),rx,ty,{align:'right'}); return;
        }

        doc.setFont('helvetica',bold?'bold':'normal'); doc.setFontSize(bold?FS+0.2:FS);
        doc.setTextColor(...clr);
        if(txt){ doc.text(txt,rx,ty,{align:'right'}); }
        else { doc.setFont('helvetica','normal'); doc.setFontSize(FS-0.8); doc.setTextColor(205,215,230); doc.text('\u2013',col.x+col.w/2,ty,{align:'center'}); }
      });
      y+=RH;
    });

    // ── Footer / Totals ──
    const FH=6.5;
    doc.setFillColor(232,237,252); doc.rect(M,y,CW,FH,'F');
    doc.setDrawColor(168,182,215); doc.setLineWidth(0.25); doc.rect(M,y,CW,FH,'S');

    COLS.forEach(col=>{
      doc.setDrawColor(185,195,220); doc.setLineWidth(0.12); doc.rect(col.x,y,col.w,FH,'S');
      const rx=col.x+col.w-1.2, ty=y+4.2;

      if(col.key==='name'){
        doc.setFont('helvetica','bold'); doc.setFontSize(6.2); doc.setTextColor(55,70,120);
        doc.text('TOTAL',col.x+1.5,ty); return;
      }
      if(col.key.startsWith('ot_')){
        const v=T[col.key];
        doc.setFont('helvetica','bold'); doc.setFontSize(6); doc.setTextColor(...(v?[150,75,5]:[200,210,228]));
        doc.text(v?v.toFixed(1):'\u2013',rx,ty,{align:'right'}); return;
      }
      if(col.key==='otHrs'){
        doc.setFont('helvetica','bold'); doc.setFontSize(6.5); doc.setTextColor(150,75,5);
        doc.text(T.otHrs?T.otHrs.toFixed(1):'\u2013',rx,ty,{align:'right'}); return;
      }
      if(col.key==='otPay'){
        doc.setFont('helvetica','bold'); doc.setFontSize(6.5); doc.setTextColor(120,50,5);
        doc.text(T.otPay?P(T.otPay):'\u2013',rx,ty,{align:'right'}); return;
      }
      if(col.key==='dedTot'){
        doc.setFillColor(255,215,215); doc.rect(col.x,y,col.w,FH,'F');
        doc.setDrawColor(185,195,220); doc.setLineWidth(0.12); doc.rect(col.x,y,col.w,FH,'S');
        doc.setFont('helvetica','bold'); doc.setFontSize(6.5); doc.setTextColor(145,18,18);
        doc.text(T.dedTot?P(T.dedTot):'\u2013',rx,ty,{align:'right'}); return;
      }
      if(col.key==='net'){
        doc.setFillColor(192,240,212); doc.rect(col.x,y,col.w,FH,'F');
        doc.setDrawColor(185,195,220); doc.setLineWidth(0.12); doc.rect(col.x,y,col.w,FH,'S');
        doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor(5,95,52);
        doc.text(P(T.net),rx,ty,{align:'right'}); return;
      }
      const vmap={pay:T.pay,allow:T.allow,hol:T.hol,sss:T.sss,ph:T.ph,pag:T.pag,sssl:T.sssl,pagl:T.pagl,abs:T.abs};
      const v=vmap[col.key]||0;
      doc.setFont('helvetica','bold'); doc.setFontSize(6); doc.setTextColor(...col.clr);
      doc.text(v?P(v):'\u2013',rx,ty,{align:'right'});
    });
    return y+FH;
  }

  function addFooters(){
    const tp=doc.getNumberOfPages();
    for(let p=1;p<=tp;p++){
      doc.setPage(p);
      doc.setDrawColor(205,212,232); doc.setLineWidth(0.3);
      doc.line(M,PH-7,PW-M,PH-7);
      doc.setFont('helvetica','normal'); doc.setFontSize(5.5); doc.setTextColor(158,165,188);
      doc.text('Generated: '+new Date().toLocaleDateString('en-PH',{year:'numeric',month:'long',day:'numeric'}),M,PH-4.5);
      doc.text('CONFIDENTIAL \u2014 For Internal Use Only',PW/2,PH-4.5,{align:'center'});
      doc.text('Page '+p+' of '+tp,PW-M,PH-4.5,{align:'right'});
    }
  }

  if(isCombined){
    doc.setFillColor(15,48,172); doc.rect(M,M,CW,9,'F');
    doc.setFillColor(80,125,255); doc.rect(M,M,4,9,'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(10.5); doc.setTextColor(255,255,255);
    doc.text('WEEKLY PAYROLL SUMMARY \u2014 '+wkLabel, PW/2, M+6, {align:'center'});
    const titleH=9+3;
    const halfH=Math.floor((PH-M*2-titleH-8)/2)-2;
    drawGroup(mo.litrad,'litrad','LITRAD INC.',M+titleH,halfH);
    const divY=M+titleH+halfH+1;
    doc.setDrawColor(178,190,215); doc.setLineWidth(0.4);
    doc.setLineDash([3,2]); doc.line(M,divY,PW-M,divY); doc.setLineDash([]);
    drawGroup(mo.jvt,'jvt','JVT CORPORATION',divY+2,halfH);
  } else {
    drawGroup(mo.litrad,'litrad','LITRAD INC.',M,PH-M*2-8);
    doc.addPage();
    drawGroup(mo.jvt,'jvt','JVT CORPORATION',M,PH-M*2-8);
  }

  addFooters();
  const tag=isCombined?'COMBINED':'SEPARATE';
  doc.save('WEEKLY_SUMMARY_'+curMonth+'_'+curYear+'_'+wk+'_'+tag+'.pdf');
}


function exportCSV(){
  if(!curMonth||!DB[curMonth])return;
  const rows=[],hdr=['GROUP','EMPLOYEE','WORK_DAYS'];
  SECTIONS.forEach(s=>WKS.forEach(w=>hdr.push(`${s.l}_${w}`)));
  WKS.forEach(w=>hdr.push('NET_'+w));WKS.forEach(w=>DAYS.forEach(d=>hdr.push(`OT_${w}_${d}`)));
  rows.push(hdr.join(','));
  ['litrad','jvt'].forEach(g=>{DB[curMonth][g].forEach(emp=>{const r=[g.toUpperCase(),`"${emp.name}"`,emp.workDays||6];SECTIONS.forEach(s=>WKS.forEach(w=>r.push(n2(emp.cells[s.k+'_'+w]).toFixed(2))));WKS.forEach(w=>r.push(calcNet(emp,w).toFixed(2)));WKS.forEach(w=>DAYS.forEach(d=>r.push(n2(emp.ot?.[w]?.[d]).toFixed(1))));rows.push(r.join(','));});});
  const blob=new Blob([rows.join('\n')],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`PAYROLL_${curMonth}_${curYear}.csv`;a.click();
}

function openModal(id){document.getElementById(id).classList.remove('hidden');}
function closeModal(id){document.getElementById(id).classList.add('hidden');}
function openConfirm(title,msg,cb){document.getElementById('conf-title').textContent=title;document.getElementById('conf-msg').textContent=msg;confirmCb=cb;openModal('m-conf');}
document.getElementById('conf-ok').onclick=()=>{if(confirmCb)confirmCb();closeModal('m-conf');confirmCb=null;};
['m-new','m-emp','m-conf','m-leave'].forEach(id=>{document.getElementById(id).addEventListener('click',e=>{if(e.target.id===id)closeModal(id);});});
document.getElementById('nm-inp').addEventListener('keydown',e=>{if(e.key==='Enter')confirmNewMonth();});
document.getElementById('emp-inp').addEventListener('keydown',e=>{if(e.key==='Enter')confirmAddEmp();});
document.addEventListener('keydown',e=>{
  if((e.key==='Enter'||e.key==='Tab')&&document.activeElement.tagName==='INPUT'&&!document.activeElement.readOnly){
    const all=[...document.querySelectorAll('.pt input[type=number]:not([readonly]),.ott input[type=number]:not([readonly])')];
    const idx=all.indexOf(document.activeElement);if(idx>=0&&idx<all.length-1){e.preventDefault();all[idx+1].focus();all[idx+1].select();}
  }
  if(e.key==='Escape')['m-new','m-emp','m-conf','m-leave'].forEach(id=>closeModal(id));
});

// ── YEAR MANAGEMENT ──
let curYear=new Date().getFullYear().toString();
function getYearList(){
  const stored=JSON.parse(localStorage.getItem('pr26_years')||'[]');
  if(!stored.includes(curYear))stored.push(curYear);
  stored.sort();localStorage.setItem('pr26_years',JSON.stringify(stored));
  return stored;
}
function switchYear(yr){
  save();localStorage.setItem('pr26_curyear',yr);curYear=yr;
  const raw=localStorage.getItem('pr26c_'+yr);DB=raw?JSON.parse(raw):{};
  curMonth=localStorage.getItem('pr26cm_'+yr)||'';
  if(!Object.keys(DB).filter(k=>k!=='_empMeta').length){DB['JANUARY']=seedJan();DB['FEBRUARY']=seedFeb();curMonth='FEBRUARY';}
  if(!curMonth||!DB[curMonth])curMonth=Object.keys(DB).filter(k=>k!=='_empMeta')[0]||'';
  otWkIdx=0;renderAll();
}
function addYear(){
  const yr=prompt('Enter year (e.g. 2027):');if(!yr)return;
  const y=yr.trim();if(!/^\d{4}$/.test(y)){alert('Invalid year format');return;}
  const stored=getYearList();if(!stored.includes(y)){stored.push(y);localStorage.setItem('pr26_years',JSON.stringify(stored));}
  switchYear(y);
}
function deleteYear(yr){
  const ylist=getYearList();if(ylist.length<=1){alert('Cannot delete the only year.');return;}
  if(!confirm(`Delete year ${yr} and ALL its payroll data? This cannot be undone.`))return;
  const updated=ylist.filter(y=>y!==yr);localStorage.setItem('pr26_years',JSON.stringify(updated));
  localStorage.removeItem('pr26c_'+yr);localStorage.removeItem('pr26cm_'+yr);
  if(curYear===yr){switchYear(updated[0]);}else{renderYearTabs();}
}

save=function(){localStorage.setItem('pr26c_'+curYear,JSON.stringify(DB));localStorage.setItem('pr26cm_'+curYear,curMonth);};
load=function(){
  curYear=localStorage.getItem('pr26_curyear')||new Date().getFullYear().toString();
  getYearList();
  const raw=localStorage.getItem('pr26c_'+curYear)||localStorage.getItem('pr26c');
  DB=raw?JSON.parse(raw):{};
  curMonth=localStorage.getItem('pr26cm_'+curYear)||localStorage.getItem('pr26cm')||'';
  if(!Object.keys(DB).filter(k=>k!=='_empMeta').length){DB['JANUARY']=seedJan();DB['FEBRUARY']=seedFeb();curMonth='FEBRUARY';}
  if(!curMonth||!DB[curMonth])curMonth=Object.keys(DB).filter(k=>k!=='_empMeta')[0]||'';
};

load();renderAll();
